          MODELDEPLOYMENT_EXTENSION_TYPE: ${{ secrets.MODELDEPLOYMENT_EXTENSION_TYPE }}
          MODELDEPLOYMENT_EXTENSION_VERSION: ${{ env.IMG_TAG }}
          MODELDEPLOYMENT_EXTENSION_REGISTRY: ${{ secrets.KAITO_ACR_REGISTRY }}
        run: |
          az login --identity --client-id "${IDENTITY_CLIENT_ID}"
          az rest --resource "${EXTENSIONS_DP_RESOURCE}" --method 'PUT' --url "https://${EXTENSIONS_DP_ENDPOINT}/subscriptions/${MODELDEPLOYMENT_EXTENSION_SUBSCRIPTION}/extensionTypeRegistrations/${MODELDEPLOYMENT_EXTENSION_TYPE}/versions/${MODELDEPLOYMENT_EXTENSION_VERSION}?api-version=${EXTENSIONS_API_VERSION}" --body '{
