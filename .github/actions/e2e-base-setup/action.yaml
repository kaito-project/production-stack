name: 'E2E Base Setup'
description: >-
  Reusable composite action that prepares the full E2E base environment:
  loads component versions, sets up Go, logs in to Azure, optionally builds
  the gpu-node-mocker image (skipped when node-provisioner=karpenter), creates
  the AKS cluster, installs all components, and validates them.

inputs:
  resource-group:
    description: 'Azure resource group to host the AKS cluster.'
    required: true
  cluster-name:
    description: 'AKS cluster name.'
    required: true
  acr-name:
    description: 'ACR name (no FQDN).'
    required: true
  gpu-mocker-image:
    description: 'Local docker tag for the gpu-node-mocker image (e.g. gpu-node-mocker:latest-<runid>). Ignored when node-provisioner=karpenter.'
    required: false
    default: ''
  location:
    description: 'Azure region for the cluster.'
    required: false
    default: 'swedencentral'
  node-count:
    description: 'Number of AKS nodes.'
    required: false
    default: '3'
  node-vm-size:
    description: 'AKS node VM size.'
    required: false
    default: 'Standard_D4d_v4'
  provider:
    description: 'E2E provider (upstream|azure) — master switch for component install mix. Empty defaults to upstream.'
    required: false
    default: ''
  # Component version overrides — empty string means "use versions.env default".
  istio-version:
    description: 'Istio version override.'
    required: false
    default: ''
  gateway-api-version:
    description: 'Gateway API CRD version override.'
    required: false
    default: ''
  keda-version:
    description: 'KEDA Helm chart version override.'
    required: false
    default: ''
  llm-gateway-auth-version:
    description: 'LLM Gateway Auth Helm chart version override.'
    required: false
    default: ''
  node-provisioner:
    description: >
      KAITO node provisioner. Set to "karpenter" to use self-managed Karpenter
      (installed via Helm). When "karpenter": gpu-node-mocker is not built or
      deployed, and KAITO is launched with --node-provisioner=karpenter.
      Default: empty (gpu-node-mocker path).
    required: false
    default: ''

outputs:
  image:
    description: 'Pushed gpu-node-mocker image (ACR FQDN with tag).'
    value: ${{ steps.image.outputs.image }}

runs:
  using: composite
  steps:
    - name: Load component versions
      shell: bash
      run: |
        # Source defaults from the centralized version file (loaded exactly once).
        source versions.env
        # Inputs override defaults when non-empty.
        INPUT_PROVIDER="${{ inputs.provider }}"
        INPUT_ISTIO="${{ inputs.istio-version }}"
        INPUT_GWAPI="${{ inputs.gateway-api-version }}"
        INPUT_KEDA="${{ inputs.keda-version }}"
        INPUT_LGA="${{ inputs.llm-gateway-auth-version }}"
        INPUT_NODE_PROVISIONER="${{ inputs.node-provisioner }}"
        [ -n "${INPUT_PROVIDER}" ] && E2E_PROVIDER="${INPUT_PROVIDER}"
        [ -n "${INPUT_ISTIO}" ] && ISTIO_VERSION="${INPUT_ISTIO}"
        [ -n "${INPUT_GWAPI}" ] && GATEWAY_API_VERSION="${INPUT_GWAPI}"
        [ -n "${INPUT_KEDA}" ]  && KEDA_VERSION="${INPUT_KEDA}"
        [ -n "${INPUT_LGA}" ]   && LLM_GATEWAY_AUTH_VERSION="${INPUT_LGA}"
        KAITO_NODE_PROVISIONER="${INPUT_NODE_PROVISIONER}"

        # Validate provider value.
        case "${E2E_PROVIDER}" in
          upstream|azure) ;;
          *)
            echo "Invalid E2E_PROVIDER='${E2E_PROVIDER}'. Must be 'upstream' or 'azure'." >&2
            exit 1
            ;;
        esac

        # Derive KEDA install namespace from provider.
        case "${E2E_PROVIDER}" in
          upstream) KEDA_NAMESPACE="keda" ;;
          azure)    KEDA_NAMESPACE="kube-system" ;;
        esac

        # Export to GITHUB_ENV so all subsequent steps inherit these.
        {
          echo "GO_VERSION=${GO_VERSION}"
          echo "E2E_PROVIDER=${E2E_PROVIDER}"
          echo "KEDA_NAMESPACE=${KEDA_NAMESPACE}"
          echo "ISTIO_VERSION=${ISTIO_VERSION}"
          echo "GATEWAY_API_VERSION=${GATEWAY_API_VERSION}"
          echo "KEDA_VERSION=${KEDA_VERSION}"
          echo "LLM_GATEWAY_AUTH_VERSION=${LLM_GATEWAY_AUTH_VERSION}"
          echo "LLM_GATEWAY_AUTH_IMAGE_TAG=${LLM_GATEWAY_AUTH_IMAGE_TAG}"
          echo "AKS_K8S_VERSION=${AKS_K8S_VERSION}"
          echo "KAITO_NODE_PROVISIONER=${KAITO_NODE_PROVISIONER}"
        } >> "$GITHUB_ENV"

    - name: Print versions
      shell: bash
      run: |
        echo "E2E_PROVIDER=${E2E_PROVIDER}"
        echo "KEDA_NAMESPACE=${KEDA_NAMESPACE}"
        echo "GO_VERSION=${GO_VERSION}"
        echo "ISTIO_VERSION=${ISTIO_VERSION}"
        echo "GATEWAY_API_VERSION=${GATEWAY_API_VERSION}"
        echo "KEDA_VERSION=${KEDA_VERSION}"
        echo "LLM_GATEWAY_AUTH_VERSION=${LLM_GATEWAY_AUTH_VERSION}"
        echo "LLM_GATEWAY_AUTH_IMAGE_TAG=${LLM_GATEWAY_AUTH_IMAGE_TAG}"
        echo "AKS_K8S_VERSION=${AKS_K8S_VERSION}"
        echo "KAITO_NODE_PROVISIONER=${KAITO_NODE_PROVISIONER}"

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Azure Login
      shell: bash
      run: az login --identity

    - name: Prepare gpu-node-mocker image
      id: image
      if: ${{ inputs.node-provisioner != 'karpenter' }}
      shell: bash
      env:
        RESOURCE_GROUP: ${{ inputs.resource-group }}
        CLUSTER_NAME: ${{ inputs.cluster-name }}
        ACR_NAME: ${{ inputs.acr-name }}
        LOCATION: ${{ inputs.location }}
        IMG: ${{ inputs.gpu-mocker-image }}
      run: |
        OUTPUT=$(make e2e-prepare-image)
        echo "image=$(echo "$OUTPUT" | grep '^image=' | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

    - name: Create resource group and ACR (Karpenter path)
      if: ${{ inputs.node-provisioner == 'karpenter' }}
      shell: bash
      env:
        RESOURCE_GROUP: ${{ inputs.resource-group }}
        CLUSTER_NAME: ${{ inputs.cluster-name }}
        ACR_NAME: ${{ inputs.acr-name }}
        LOCATION: ${{ inputs.location }}
      run: make e2e-prepare-image

    - name: Setup cluster
      shell: bash
      env:
        RESOURCE_GROUP: ${{ inputs.resource-group }}
        CLUSTER_NAME: ${{ inputs.cluster-name }}
        ACR_NAME: ${{ inputs.acr-name }}
        LOCATION: ${{ inputs.location }}
        NODE_COUNT: ${{ inputs.node-count }}
        NODE_VM_SIZE: ${{ inputs.node-vm-size }}
      run: make e2e-setup

    - name: Install karpenter helm chart
      if: ${{ inputs.node-provisioner == 'karpenter' }}
      shell: bash
      run: |
        # Ensure yq v4.30+ is available for envsubst(nu) support required by configure-values.sh
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
        make karpenter-azure-identity
        make azure-karpenter-helm
      env:
        AZURE_RESOURCE_GROUP: ${{ inputs.resource-group }}
        AZURE_CLUSTER_NAME: ${{ inputs.cluster-name }}

    - name: Install components
      shell: bash
      env:
        SHADOW_CONTROLLER_IMAGE: ${{ steps.image.outputs.image }}
        KAITO_NODE_PROVISIONER: ${{ inputs.node-provisioner }}
      run: make e2e-install

    - name: Validate components
      shell: bash
      run: make e2e-validate
