  modelharness:
  - apiVersion: v2
    appVersion: 0.2.0
    created: "2026-06-11T04:41:42.689058019Z"
    description: 'Per-namespace shared resources for production-stack workloads. One
      modelharness release per workload namespace provisions the artifacts every model
      deployment in that namespace shares: the Istio Gateway, the catch-all HTTPRoute
      (forwards unknown-model requests to the cluster-shared model-not-found Service
      via a ReferenceGrant), and — when enabled — the APIKey CR that triggers the
      apikey-operator to mint the per-namespace `llm-api-key` Secret consumed by clients.
      ext_authz enforcement on the Gateway HTTP filter chain is owned by the cluster-wide
      EnvoyFilter shipped by the `llm-gateway-apikey` subchart of `productionstack`
      (since 0.0.11-alpha), not by a per-namespace AuthorizationPolicy. The shared
      model-not-found Service itself is installed once per cluster by the E2E install
      script. '
    digest: 903aecb51a4691f94b78504521389738863a72bb7b9fa5917528e781fb76a382
    name: modelharness
    type: application
    urls:
    - https://kaito-project.github.io/production-stack/charts/kaito-project/modelharness-0.2.0.tgz
    version: 0.2.0
  - apiVersion: v2
    appVersion: 0.1.0
    created: "2026-05-12T21:45:37.559243201Z"
    description: 'Per-namespace shared resources for production-stack workloads. One
      modelharness release per workload namespace provisions the artifacts every model
      deployment in that namespace shares: the Istio Gateway, the catch-all HTTPRoute
      (forwards unknown-model requests to the cluster-shared model-not-found Service
      via a ReferenceGrant), and — when enabled — the AuthorizationPolicy + APIKey
      CR that wire the Gateway into the cluster-wide apikey-ext-authz CUSTOM provider.
      The shared model-not-found Service itself is installed once per cluster by the
      E2E install script. '
    digest: a5a1179dab8c913f64de4159b7ffdc20e086f0869194e76888056b28d2f32faa
    name: modelharness
