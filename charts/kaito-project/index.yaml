  productionstack:
  - apiVersion: v2
    appVersion: 0.2.0
    created: "2026-06-11T04:41:42.691720106Z"
    dependencies:
    - name: body-based-routing
      repository: ""
      tags:
      - gateway
      - routing
      version: 0.1.0
    - name: keda-kaito-scaler
      repository: ""
      tags:
      - autoscaling
      version: 0.5.1
    - condition: llm-gateway-apikey.enabled
      name: llm-gateway-apikey
      repository: oci://mcr.microsoft.com/aks/kaito/helm
      tags:
      - gateway
      - auth
      version: 0.0.11-alpha
    description: 'Umbrella Helm chart that installs all CLUSTER-LEVEL components and
      CRDs required by the Kaito production stack: body-based routing (BBR), KEDA
      Kaito scaler, LLM gateway auth, and other shared infrastructure.  This chart
      is intended to be consumed as a dependency of the top-level `kaito` Helm chart.
      Each component is shipped as a subchart under `charts/`. body-based-routing
      and keda-kaito-scaler are mandatory cluster infrastructure and are always installed;
      optional components (e.g. llm-gateway-apikey) carry a `<component>.enabled`
      toggle in values.yaml. Component-specific values are passed through by nesting
      them under the subchart''s name, e.g.:      body-based-routing:       bbr:         replicas:
      2  Adding a new cluster-level component is a matter of dropping its chart under
      `charts/` and appending a new entry to the `dependencies` list below. '
    digest: 41b934375c0f5b841c5515bbe099c92eb66b8e0fbac7a750fb46ee8dc278a9aa
