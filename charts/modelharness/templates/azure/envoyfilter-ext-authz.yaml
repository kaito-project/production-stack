{{- if and .Values.auth.enabled (eq .Values.cloudprovider "azure") }}
{{- $mode := default "azure" .Values.auth.mode -}}
{{- if has $mode (list "azure" "hybrid") -}}
{{- $apikeySvc := printf "%s.%s.svc.cluster.local" .Values.auth.extAuthz.serviceName .Values.auth.extAuthz.serviceNamespace -}}
{{- $apikeyCluster := printf "outbound|%d||%s" (int .Values.auth.extAuthz.grpcPort) $apikeySvc -}}
{{- $azureSvc := printf "%s.%s.svc.cluster.local" .Values.auth.extAuthzAzure.serviceName .Values.auth.extAuthzAzure.serviceNamespace -}}
{{- $azureCluster := printf "outbound|%d||%s" (int .Values.auth.extAuthzAzure.grpcPort) $azureSvc -}}
{{/*
Per-namespace ext_authz EnvoyFilter (Azure variant).

Rendered only when `cloudprovider=azure` and `auth.enabled=true`. Splices
ext_authz into this namespace's Gateway pod (`<namespace>-gw`), pointing
at cluster-wide gRPC Services installed by `charts/productionstack`:
  * apikey — apikey-authz (subchart `llm-gateway-apikey`)
  * azure  — azure-authz  (subchart `llm-gateway-azureauth`)

`auth.mode` selects the wiring shape:

  azure   — single ext_authz to azure-authz. Always INSERT_AFTER jwt_authn
            (Gateway MUST have a RequestAuthentication so the validated
            Entra JWT claims land in envoy.filters.http.jwt_authn's
            filter metadata, which azure-authz consumes).

  hybrid  — Lua classifier at head of chain routes by Authorization
            header shape (tokens starting `sk-` → apikey, else → azure).
            Both ext_authz filters render with filter_enabled_metadata
            gates keyed off the classifier's auth_mode dynamic metadata.
            Chain order after INSERT_FIRST reversal:
              Lua → apikey ext_authz → jwt_authn → azure ext_authz → router.

Why per-namespace and not cluster-wide:
  - Auth scope is per workload namespace — different tenants get different
    APIKey / Entra configurations and may opt out of auth entirely.
  - The upstream subchart EnvoyFilters are workloadSelector-scoped to a
    single Gateway in one namespace, so they cannot cover the
    `<namespace>-gw` Gateways that live in each workload namespace. The
    umbrella chart neutralises the upstream cluster-wide EnvoyFilters so
    this template is the sole source of ext_authz wiring on inference
    Gateways.

The `outbound|<port>||<svc>` cluster is auto-generated by istiod for any
Service in the mesh. The shared Services are cross-namespace; the Gateway
pod's Istio sidecar handles mTLS automatically (PERMISSIVE by default).
*/}}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: ext-authz
  namespace: {{ include "modelharness.namespace" . }}
  labels:
    {{- include "modelharness.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ include "modelharness.gatewayName" . | quote }}
  configPatches:
    {{- if eq $mode "azure" }}
    {{/* ── Single-backend azure mode ─────────────────────────────────── */}}
    # Remove any ext_authz filter Istio may have inserted via a CUSTOM
    # AuthorizationPolicy so we don't end up with two ext_authz filters
    # in the chain.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.ext_authz
      patch:
        operation: REMOVE
    # Insert ext_authz AFTER jwt_authn so validated Entra JWT claims are
    # available to azure-authz in the ext_authz request metadata under
    # "envoy.filters.http.jwt_authn".
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.jwt_authn
      patch:
        operation: INSERT_AFTER
        value:
          name: envoy.filters.http.ext_authz
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            # Fail-closed: when azure-authz is unreachable or slow, Envoy
            # denies the request rather than admitting it.
            failure_mode_allow: false
            # Pin to 503 so an ext_authz outage deterministically surfaces
            # as a 5xx that local_reply rewrites to
            # 502 ext_authz_unavailable (x-kaito-error-source: authz).
            status_on_error:
              code: ServiceUnavailable
            grpc_service:
              envoy_grpc:
                cluster_name: {{ $azureCluster | quote }}
                authority: {{ $azureSvc | quote }}
              timeout: {{ .Values.auth.extAuthzAzure.timeout | quote }}
            metadata_context_namespaces:
              - envoy.filters.http.jwt_authn
    {{- else }}
    {{/* ── hybrid mode ───────────────────────────────────────────────────
         INSERT_FIRST reverses insertion order. Final chain order:
           lua-classify → apikey ext_authz → lua-strip → jwt_authn →
           azure ext_authz → router.

         Rationale for lua-strip: Istio's RequestAuthentication inserts
         jwt_authn unconditionally, and jwt_authn rejects ANY value in
         `Authorization: Bearer <token>` that isn't `header.payload.sig`.
         A valid `sk-...` API key would therefore be 401'd by jwt_authn
         BEFORE reaching the router. The strip Lua removes the Authorization
         header on the apikey path (after apikey ext_authz has already read
         and validated it) so jwt_authn becomes a no-op for that path.
         The OpenAI SDK contract (`Authorization: Bearer <key-or-jwt>`)
         is preserved for clients — the header only disappears in-chain. */}}
    # ── 1. azure ext_authz: INSERT_AFTER jwt_authn so validated Entra
    #      claims land in ext_authz request metadata under
    #      "envoy.filters.http.jwt_authn". Gated to auth_mode = azure.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.jwt_authn
      patch:
        operation: INSERT_AFTER
        value:
          name: ext_authz.azure
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            failure_mode_allow: false
            status_on_error:
              code: ServiceUnavailable
            grpc_service:
              envoy_grpc:
                cluster_name: {{ $azureCluster | quote }}
                authority: {{ $azureSvc | quote }}
              timeout: {{ .Values.auth.extAuthzAzure.timeout | quote }}
            metadata_context_namespaces:
              - envoy.filters.http.jwt_authn
            filter_enabled_metadata:
              filter: envoy.filters.http.lua
              path:
                - key: auth_mode
              value:
                string_match:
                  exact: azure

    # ── 2. lua-strip: INSERT_FIRST. Ends up between apikey ext_authz
    #      (also INSERT_FIRST, applied later so it lands earlier) and
    #      Istio's native metadata_exchange + jwt_authn (which sit at
    #      their conventional slots). When auth_mode=apikey removes the
    #      Authorization header so jwt_authn does not see the API key
    #      and reject it. Reads auth_mode from the classifier Lua's
    #      dynamic metadata; the check gates the side effect.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_FIRST
        value:
          name: strip-authz-header
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            default_source_code:
              inline_string: |
                function envoy_on_request(handle)
                  local md = handle:streamInfo():dynamicMetadata():get("envoy.filters.http.lua")
                  if md and md["auth_mode"] == "apikey" then
                    handle:headers():remove("authorization")
                  end
                end

    # ── 3. apikey ext_authz: INSERT_FIRST. Applied after strip (so
    #      lands before strip in the chain) — ext_authz.apikey still
    #      sees the Authorization header when it calls apikey-authz.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_FIRST
        value:
          name: ext_authz.apikey
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            failure_mode_allow: false
            status_on_error:
              code: ServiceUnavailable
            grpc_service:
              envoy_grpc:
                cluster_name: {{ $apikeyCluster | quote }}
                authority: {{ $apikeySvc | quote }}
              timeout: {{ .Values.auth.extAuthz.timeout | quote }}
            filter_enabled_metadata:
              filter: envoy.filters.http.lua
              path:
                - key: auth_mode
              value:
                string_match:
                  exact: apikey

    # ── 4. lua-classify-authmode: INSERT_FIRST — ends up at the head of
    #      the HCM filter chain. Sole purpose: inspect the inbound
    #      Authorization header (stripping a case-insensitive `Bearer `
    #      prefix if present) and classify the request into one of two
    #      auth backends by writing dynamic metadata under the
    #      `envoy.filters.http.lua` namespace:
    #
    #        auth_mode = "apikey" — token starts with "sk-" (OpenAI-style
    #                               API key convention).
    #        auth_mode = "azure"  — anything else, including no Authorization
    #                               header (azure-authz will then reject
    #                               with "no valid JWT claims in filter
    #                               metadata").
    #
    #      Every downstream filter that needs to know which backend the
    #      request belongs to keys off this dynamic metadata:
    #        * ext_authz.apikey        — filter_enabled_metadata gate
    #                                    (only calls apikey-authz when
    #                                    auth_mode == apikey).
    #        * strip-authz-header      — removes Authorization only when
    #                                    auth_mode == apikey, so
    #                                    jwt_authn does not see the API
    #                                    key and reject it as a malformed
    #                                    JWT.
    #        * ext_authz.azure         — filter_enabled_metadata gate
    #                                    (only calls azure-authz when
    #                                    auth_mode == azure).
    #
    #      The metadata namespace is intentionally `envoy.filters.http.lua`
    #      (the well-known Lua filter type name), NOT the filter's `name`
    #      field — that lets the strip filter (also a Lua instance under a
    #      different `name`) read from the same namespace without further
    #      coordination.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_FIRST
        value:
          name: lua-classify-authmode
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            default_source_code:
              inline_string: |
                function envoy_on_request(handle)
                  local auth = handle:headers():get("authorization") or ""
                  local token = auth:match("^[Bb][Ee][Aa][Rr][Ee][Rr]%s+(.*)$") or auth
                  local mode = token:sub(1, 3) == "sk-" and "apikey" or "azure"
                  handle:streamInfo():dynamicMetadata():set(
                    "envoy.filters.http.lua", "auth_mode", mode)
                end
    {{- end }}
{{- end }}
{{- end }}
