{{- if .Values.auth.enabled }}
{{- $svc := printf "%s.%s.svc.cluster.local" .Values.auth.extAuthz.serviceName .Values.auth.extAuthz.serviceNamespace -}}
{{- $cluster := printf "outbound|%d||%s" (int .Values.auth.extAuthz.grpcPort) $svc -}}
{{/*
Per-namespace ext_authz EnvoyFilter.

API-key enforcement in production-stack is scoped to the workload
namespace: each `modelharness` release renders its own EnvoyFilter
that splices `envoy.filters.http.ext_authz` into THIS namespace's
Gateway pod (`<namespace>-gw`), pointing at the cluster-wide
apikey-authz gRPC Service installed once by the `llm-gateway-apikey`
subchart of `productionstack` (defaults: `apikey-authz` in
`llm-gateway-auth`, port 9001).

Why per-namespace and not cluster-wide:
  - Auth scope is per workload namespace — different tenants get
    different APIKey CRs and may opt out of auth entirely.
  - The upstream `llm-gateway-apikey` chart's own EnvoyFilter is
    workloadSelector-scoped to a single
    `gateway.networking.k8s.io/gateway-name` label and renders into
    one `istio.gatewayNamespace`. modelharness Gateways are named
    `<namespace>-gw` and live in the workload namespace, so a single
    upstream EnvoyFilter cannot cover them all. The umbrella chart
    deliberately neutralises the upstream EnvoyFilter (see
    `charts/productionstack/values.yaml`) so this template is the
    sole source of ext_authz wiring on inference Gateways.

This replaces the previous CUSTOM `AuthorizationPolicy` (relied on
`MeshConfig.extensionProviders[apikey-ext-authz]`, both removed in
upstream chart 0.0.11-alpha).

The `outbound|<port>||<svc>` cluster is auto-generated by istiod for
any Service in the mesh — no extra cluster definition is required.
The shared Service is cross-namespace; the Gateway pod's Istio
sidecar handles mTLS upgrade automatically (Istio defaults to
PERMISSIVE so sidecar-to-sidecar hops are mTLS while plaintext
control-plane probes still work). Set
`llm-gateway-apikey.istio.strictMTLS: true` on the umbrella to
force STRICT inbound mTLS on the apikey-authz Deployment.
*/}}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: apikey-ext-authz
  namespace: {{ include "modelharness.namespace" . }}
  labels:
    {{- include "modelharness.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ include "modelharness.gatewayName" . | quote }}
  configPatches:
    {{- if eq .Values.auth.extAuthz.operation "INSERT_AFTER" }}
    # Remove any ext_authz filter Istio may have inserted via a CUSTOM
    # AuthorizationPolicy so we don't end up with two ext_authz filters
    # in the chain.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.ext_authz
      patch:
        operation: REMOVE
    # Insert ext_authz AFTER jwt_authn so JWT claims are available in
    # the ext_authz request metadata.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.jwt_authn
      patch:
        operation: INSERT_AFTER
    {{- else }}
    # Insert ext_authz at the head of the HTTP filter chain. Works
    # without a RequestAuthentication / jwt_authn filter being present.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_FIRST
    {{- end }}
        value:
          name: envoy.filters.http.ext_authz
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            grpc_service:
              envoy_grpc:
                cluster_name: {{ $cluster | quote }}
                authority: {{ $svc | quote }}
              timeout: {{ .Values.auth.extAuthz.timeout | quote }}
            {{- with .Values.auth.extAuthz.metadataContextNamespaces }}
            metadata_context_namespaces:
              {{- toYaml . | nindent 14 }}
            {{- end }}
{{- end }}
