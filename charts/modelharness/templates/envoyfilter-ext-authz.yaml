{{- if .Values.auth.enabled }}
{{- $svc := printf "%s.%s.svc.cluster.local" .Values.auth.extAuthz.serviceName .Values.auth.extAuthz.serviceNamespace -}}
{{- $cluster := printf "outbound|%d||%s" (int .Values.auth.extAuthz.grpcPort) $svc -}}
{{/*
Per-namespace ext_authz EnvoyFilter.

API-key enforcement is scoped to the workload namespace: each `modelharness`
release renders its own EnvoyFilter that splices
`envoy.filters.http.ext_authz` into this namespace's Gateway pod
(`<namespace>-gw`), pointing at the cluster-wide apikey-authz gRPC Service
installed by the `llm-gateway-apikey` subchart of `productionstack`
(defaults: `apikey-authz` in `kube-system`, port 9001).

Why per-namespace and not cluster-wide:
  - Auth scope is per workload namespace — different tenants get different
    APIKey CRs and may opt out of auth entirely.
  - The upstream `llm-gateway-apikey` EnvoyFilter is workloadSelector-scoped
    to a single Gateway in one namespace, so it cannot cover the
    `<namespace>-gw` Gateways that live in each workload namespace. The
    umbrella chart neutralises that upstream EnvoyFilter so this template is
    the sole source of ext_authz wiring on inference Gateways.

The `outbound|<port>||<svc>` cluster is auto-generated by istiod for any
Service in the mesh. The shared Service is cross-namespace; the Gateway
pod's Istio sidecar handles mTLS automatically (PERMISSIVE by default). Set
`llm-gateway-apikey.istio.strictMTLS: true` on the umbrella to force STRICT
inbound mTLS on the apikey-authz Deployment.
*/}}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: apikey-ext-authz
  namespace: {{ include "modelharness.namespace" . }}
  labels:
    {{- include "modelharness.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ include "modelharness.gatewayName" . | quote }}
  configPatches:
    {{- if eq .Values.auth.extAuthz.operation "INSERT_AFTER" }}
    # Remove any ext_authz filter Istio may have inserted via a CUSTOM
    # AuthorizationPolicy so we don't end up with two ext_authz filters
    # in the chain.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.ext_authz
      patch:
        operation: REMOVE
    # Insert ext_authz AFTER jwt_authn so JWT claims are available in
    # the ext_authz request metadata.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.jwt_authn
      patch:
        operation: INSERT_AFTER
    {{- else }}
    # Insert ext_authz at the head of the HTTP filter chain. Works
    # without a RequestAuthentication / jwt_authn filter being present.
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_FIRST
    {{- end }}
        value:
          name: envoy.filters.http.ext_authz
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
            transport_api_version: V3
            # Fail-closed: when apikey-authz is unreachable or slow, Envoy
            # denies the request rather than admitting it. Set explicitly so
            # the security posture is readable on the live resource.
            failure_mode_allow: false
            # Status returned to the client on a network/communication error
            # between this filter and apikey-authz (i.e. a full ext_authz
            # outage, e.g. the Deployment scaled to zero). Envoy's built-in
            # default here is 403 Forbidden, which would NOT trip the gateway
            # local_reply `UAEX + status >= 500 -> 502 ext_authz_unavailable`
            # mapper and would mislead clients into treating an outage as an
            # auth denial. Pin it to 503 so an ext_authz outage deterministically
            # surfaces as a 5xx that the local_reply rewrites to
            # 502 ext_authz_unavailable (x-kaito-error-source: authz).
            status_on_error:
              code: ServiceUnavailable
            grpc_service:
              envoy_grpc:
                cluster_name: {{ $cluster | quote }}
                authority: {{ $svc | quote }}
              timeout: {{ .Values.auth.extAuthz.timeout | quote }}
            {{- with .Values.auth.extAuthz.metadataContextNamespaces }}
            metadata_context_namespaces:
              {{- toYaml . | nindent 14 }}
            {{- end }}
{{- end }}
