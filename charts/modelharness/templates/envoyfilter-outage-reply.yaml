# Per-namespace gateway error `local_reply`: the single place that rewrites
# Envoy-generated 5xx local replies into the unified OpenAI-compatible error
# envelope. Every local reply with status >= 500 is intercepted here and, by
# response flag and/or request header, mapped to a distinct `code` plus an
# `x-kaito-error-source` header so client and operator can tell which layer
# failed.
#
# BBR ext_proc and apikey ext_authz both run fail-closed; an unhealthy or
# not-yet-programmed namespace Gateway also emits a local 5xx. Mappers are
# evaluated top-to-bottom, first-match wins:
#   1. ext_authz outage  - UAEX + status >= 500              -> 502 authz
#   2. BBR ext_proc outage - status == 500 + model header absent -> 502 bbr
#   3. gateway dataplane - UH / LH                           -> 502 gateway
#   4. gateway not ready - UF / UC / NC                      -> 503 gateway
#   5. catch-all         - any remaining status >= 500       -> gateway
# Specific cases precede the catch-all so each keeps its precise code; the
# final mapper guarantees no local 5xx escapes unstructured.
#
# `workloadSelector` scopes the patch to this namespace's Gateway pod.
# `operation: MERGE` on the http_connection_manager merges `local_reply_config`
# without replacing the Istio-managed filter chain. Only Envoy-generated local
# replies are rewritten; responses proxied back from an upstream pod (e.g. a
# genuine vLLM 500) are left unchanged.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: gateway-filter-outage-local-reply
  namespace: {{ include "modelharness.namespace" . }}
  labels:
    {{- include "modelharness.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ include "modelharness.gatewayName" . | quote }}
  configPatches:
    - applyTo: NETWORK_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: MERGE
        value:
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
            local_reply_config:
              mappers:
                # ext_authz outage -> 502 ext_authz_unavailable.
                # UAEX fires on any ext_authz deny or error; the `>= 500`
                # guard leaves legitimate 401/403 denies untouched and only
                # rewrites the 5xx an ext_authz outage produces.
                - filter:
                    and_filter:
                      filters:
                        - response_flag_filter:
                            flags:
                              - UAEX
                        - status_code_filter:
                            comparison:
                              op: GE
                              value:
                                default_value: 500
                                runtime_key: productionstack_ext_authz_min_status
                  status_code: 502
                  body:
                    inline_string: |
                      {"error":{"type":"service_unavailable","code":"ext_authz_unavailable","message":"The authentication service is temporarily unavailable. Please retry.","param":null}}
                  headers_to_add:
                    - header:
                        key: x-kaito-error-source
                        value: authz
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                    - header:
                        key: content-type
                        value: application/json
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                # BBR ext_proc outage -> 502 bbr_unavailable.
                # Under fail-closed, BBR emits a local 500 when it cannot reach
                # the BBR Deployment. The EPP (InferencePool) ext_proc filter
                # also runs fail-closed and emits the SAME local 500 with no
                # distinguishing response flag, so status alone is ambiguous.
                # The deterministic signal is the `X-Gateway-Model-Name`
                # request header, injected by BBR (which runs before route
                # matching, EPP after):
                #   * BBR outage -> BBR never ran  -> header ABSENT  -> match here.
                #   * EPP outage -> BBR already ran -> header PRESENT -> skip.
                # So match a local 500 ONLY when the header is absent. This
                # requires the gateway to strip any client-supplied
                # `X-Gateway-Model-Name` at ingress (BBR overwrites it on the
                # request path) so a spoofed header cannot mask a BBR outage.
                - filter:
                    and_filter:
                      filters:
                        - status_code_filter:
                            comparison:
                              op: EQ
                              value:
                                default_value: 500
                                runtime_key: productionstack_bbr_status
                        - header_filter:
                            header:
                              name: X-Gateway-Model-Name
                              present_match: true
                              invert_match: true
                  status_code: 502
                  body:
                    inline_string: |
                      {"error":{"type":"service_unavailable","code":"bbr_unavailable","message":"The request router is temporarily unavailable. Please retry.","param":null}}
                  headers_to_add:
                    - header:
                        key: x-kaito-error-source
                        value: bbr
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                    - header:
                        key: content-type
                        value: application/json
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                # gateway_dataplane_unhealthy -> 502 (no healthy upstream).
                # The namespace Gateway has no ready upstream to forward to:
                # UH (NoHealthyUpstream) or LH (FailedLocalHealthCheck, active
                # health checks marked every backend down).
                - filter:
                    response_flag_filter:
                      flags:
                        - UH
                        - LH
                  status_code: 502
                  body:
                    inline_string: |
                      {"error":{"message":"The namespace gateway dataplane is unhealthy; no ready upstream is available.","type":"service_unavailable","code":"gateway_dataplane_unhealthy"}}
                  headers_to_add:
                    - header:
                        key: content-type
                        value: application/json
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                    - header:
                        key: x-kaito-error-source
                        value: gateway
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                # gateway_not_programmed -> 503 (listener/cluster not ready).
                # The Gateway exists but its listener/cluster is not yet
                # programmed while the harness converges: connection
                # failure/termination (UF/UC) or the cluster has not been
                # pushed to this Gateway yet (NC, NoClusterFound).
                - filter:
                    response_flag_filter:
                      flags:
                        - UF
                        - UC
                        - NC
                  status_code: 503
                  body:
                    inline_string: |
                      {"error":{"message":"The namespace gateway is not yet programmed; retry shortly.","type":"service_unavailable","code":"gateway_not_programmed"}}
                  headers_to_add:
                    - header:
                        key: content-type
                        value: application/json
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                    - header:
                        key: x-kaito-error-source
                        value: gateway
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                # Catch-all: any remaining local 5xx -> structured gateway
                # error. Placed last so the specific mappers above keep their
                # codes. `status_code` is omitted so the original 5xx status is
                # preserved; only the body and source header are normalized.
                - filter:
                    status_code_filter:
                      comparison:
                        op: GE
                        value:
                          default_value: 500
                          runtime_key: productionstack_gateway_min_status
                  body:
                    inline_string: |
                      {"error":{"message":"The namespace gateway encountered an unexpected error. Please retry.","type":"service_unavailable","code":"gateway_internal_error"}}
                  headers_to_add:
                    - header:
                        key: content-type
                        value: application/json
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
                    - header:
                        key: x-kaito-error-source
                        value: gateway
                      append_action: OVERWRITE_IF_EXISTS_OR_ADD
