{{/*
Catch-all responder: a pair of Envoy `direct_response` routes appended to
the per-namespace Gateway after all deployment-specific HTTPRoutes (which
match on the BBR-injected `X-Gateway-Model-Name` header). Envoy generates
the response body itself, so no backend Pod / Service / ReferenceGrant is
needed.

Why a catch-all is REQUIRED, not just a UX nicety:
  Istio's CUSTOM AuthorizationPolicy is a paired rbac (shadow) + ext_authz
  filter, where ext_authz is gated on metadata the RBAC shadow writes
  during decodeHeaders. If the router fails to match any HTTPRoute it
  returns a local 404 before that metadata is written, so ext_authz never
  runs and unknown-model requests silently bypass API-key auth. A route
  that always matches preserves the full filter-chain run so auth runs on
  every request.

Two routes, first-match-wins (PRESENT must precede the unconditional
ABSENT route):
  1. `X-Gateway-Model-Name` PRESENT but unmatched -> the client named a
     model with no HTTPRoute in this namespace -> 404 `model_not_found`
     (`x-kaito-error-source: gateway`).
  2. `X-Gateway-Model-Name` ABSENT -> BBR ran but the request body had no
     usable `model` field -> 400 `invalid_request_body`
     (`x-kaito-error-source: bbr`).

Why ABSENT is 400 and not 502 bbr_unavailable: BBR ext_proc is
fail-closed (see envoyfilter-bbr.yaml), so a genuine BBR outage is
rejected at the filter stage and rewritten to 502 by
envoyfilter-outage-reply.yaml — it never reaches this route. BBR does NOT
error on a missing/empty `model`; it simply skips header injection and
lets the request through header-absent. So the only header-absent traffic
that reaches here is the missing-model case, making an unconditional 400
correct. (A body that is not valid JSON also never reaches here: BBR
returns a native 400 before routing.)

The patch is anchored to the Gateway HCM via `context: GATEWAY`;
`workloadSelector` scopes it to this namespace's Gateway pod.
*/}}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: model-not-found-direct
  namespace: {{ include "modelharness.namespace" . }}
  labels:
    {{- include "modelharness.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ include "modelharness.gatewayName" . | quote }}
  configPatches:
    - applyTo: VIRTUAL_HOST
      match:
        context: GATEWAY
        routeConfiguration:
          vhost:
            name: ""
      patch:
        operation: MERGE
        value:
          routes:
            # Appended after the per-model HTTPRoutes. The PRESENT route
            # (header set but unmatched -> 404) must precede the ABSENT
            # route (no header -> 400 invalid_request_body), which is
            # unconditional.
            - name: model-not-found-fallback
              match:
                prefix: /
                headers:
                  - name: x-gateway-model-name
                    present_match: true
              direct_response:
                status: 404
                body:
                  inline_string: |
                    {"error":{"message":"The model does not exist.","type":"invalid_request_error","param":"model","code":"model_not_found"}}
              response_headers_to_add:
                - header:
                    key: content-type
                    value: application/json
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
                - header:
                    key: x-kaito-requested-model
                    value: "%REQ(X-Gateway-Model-Name)%"
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
                - header:
                    key: x-kaito-error-source
                    value: gateway
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
            - name: invalid-request-body-fallback
              match:
                prefix: /
              direct_response:
                status: 400
                body:
                  inline_string: |
                    {"error":{"message":"The request body did not specify a model; the \"model\" field is required.","type":"invalid_request_error","param":"model","code":"invalid_request_body"}}
              response_headers_to_add:
                - header:
                    key: content-type
                    value: application/json
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
                - header:
                    key: x-kaito-error-source
                    value: bbr
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD

