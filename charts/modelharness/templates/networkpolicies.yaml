{{- if .Values.networkPolicy.enabled }}
{{/*
Per-namespace CiliumNetworkPolicy that locks down East-West ingress to
inference workloads (EPP / vLLM / shadow pods) while leaving the
per-namespace Istio Gateway pod and user-deployed pods unaffected.

Why CiliumNetworkPolicy instead of networking.k8s.io/v1 NetworkPolicy:
  On the AKS Cilium dataplane a K8s NetworkPolicy selecting a pod that
  already exists when the policy is installed can be silently never
  compiled into that endpoint's BPF policy map, leaving traffic
  unrestricted. A native CiliumNetworkPolicy reconciles through Cilium's
  own path and becomes enforcing within a single reconcile tick.

Semantics:
  A CNP that selects an endpoint puts it into default-deny for the
  directions it declares rules for (here: ingress only); any ingress not
  matched by an explicit `fromEndpoints` clause is dropped. Egress is
  untouched.

Selector scope:
  `endpointSelector` positively matches the stable
  `kaito.sh/owned-by: modeldeployment` label that modeldeployment stamps on
  the pods it owns (EPP, KAITO-rendered inference, shadow pods).
  User-deployed pods and Gateway pods do not carry it, so their ingress is
  unaffected.

Allowed peers:
  - `fromEndpoints: [{}]` matches every endpoint in the SAME namespace
    (Cilium namespace-scopes an empty endpointSelector implicitly), so the
    gateway and EPP pods can reach vLLM, EPP can reach shadow pods, etc.
  - `fromEndpoints` with `k8s:io.kubernetes.pod.namespace=<ns>` is an
    explicit cross-namespace allow for control-plane / metric-scraper
    components. The `k8s:` source prefix pins the match to Kubernetes
    labels so a pod cannot spoof the value via another label source.
*/}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: inference-pods-ingress
  namespace: {{ include "modelharness.namespace" . }}
  labels:
    {{- include "modelharness.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      kaito.sh/owned-by: modeldeployment
  ingress:
    - fromEndpoints:
        - {}
{{- range .Values.networkPolicy.allowedIngressNamespaces }}
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ . | quote }}
{{- end }}
{{- end }}
