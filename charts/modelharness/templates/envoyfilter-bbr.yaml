{{/*
Per-namespace Body-Based Router (BBR) wiring.

BBR runs as a cluster-wide singleton (one Deployment + Service installed by
charts/productionstack/charts/body-based-routing in `bbr.namespace`). This
template renders the dataplane half: the ext_proc EnvoyFilter that injects
BBR into this namespace's Gateway HCM, scoped to that Gateway pod via
`workloadSelector`.

Filter-chain placement:
  BBR injects `X-Gateway-Model-Name` from the JSON request body so the
  per-Gateway HTTPRoute and the InferencePool ext_proc filter (EPP) can
  route to the correct deployment. BBR MUST run BEFORE the InferencePool
  ext_proc filter, so it is anchored on Istio's auto-injected
  `envoy.filters.http.ext_proc` with INSERT_BEFORE, giving the chain:
    istio.metadata_exchange -> bbr -> ext_proc (InferencePool) -> ... -> router
  If ext_proc ran first it would resolve its per-route override before the
  header exists, fall through to the catch-all, and round-robin across the
  InferencePool pods (bypassing EPP).

Transport:
  BBR serves plaintext HTTP/2; the upstream cluster is plain
  `outbound|<port>||<svc>` with no upstream TLS and no DestinationRule.
  The gateway<->BBR hop never leaves the pod network.
*/}}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: bbr-ext-proc
  namespace: {{ include "modelharness.namespace" . }}
  labels:
    {{- include "modelharness.labels" . | nindent 4 }}
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: {{ include "modelharness.gatewayName" . | quote }}
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: "envoy.filters.network.http_connection_manager"
              {{- if .Values.bbr.envoyFilter.anchorSubFilter }}
              subFilter:
                name: {{ .Values.bbr.envoyFilter.anchorSubFilter }}
              {{- end }}
      patch:
        operation: {{ .Values.bbr.envoyFilter.operation }}
        value:
          name: envoy.filters.http.ext_proc.bbr
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
            # Fail-closed (explicit). When the BBR ext_proc service is
            # unreachable, Envoy rejects the request with a local reply rather
            # than skipping BBR (which would drop the X-Gateway-Model-Name
            # header and fall through to the catch-all as a misleading 404).
            failure_mode_allow: false
            # Status returned downstream when the BBR ext_proc server errors,
            # fails to respond, or cannot be reached. Envoy's built-in ext_proc
            # default is 500, but we pin it explicitly to 503 Service
            # Unavailable: a BBR outage is a transient "dependency temporarily
            # down, retry" condition, which 503 expresses more accurately than
            # the generic 500. It also aligns with the ext_authz outage status
            # (also pinned to 503), so every fail-closed cluster-filter outage
            # surfaces a consistent 503 upstream of the gateway local_reply.
            # The local_reply matches this 5xx with the model header ABSENT and
            # maps it to 502 bbr_unavailable (x-kaito-error-source: bbr). NOTE:
            # an ext_proc TIMEOUT is reported as 504 regardless of this field;
            # that path is mapped separately as a router-flag (UT) case.
            status_on_error:
              code: ServiceUnavailable
            allow_mode_override: true
            processing_mode:
              request_header_mode: {{ if .Values.bbr.supportedEvents.requestHeaders }}"SEND"{{ else }}"SKIP"{{ end }}
              response_header_mode: {{ if .Values.bbr.supportedEvents.responseHeaders }}"SEND"{{ else }}"SKIP"{{ end }}
              request_body_mode: {{ if .Values.bbr.supportedEvents.requestBody }}"FULL_DUPLEX_STREAMED"{{ else }}"NONE"{{ end }}
              response_body_mode: {{ if .Values.bbr.supportedEvents.responseBody }}"FULL_DUPLEX_STREAMED"{{ else }}"NONE"{{ end }}
              request_trailer_mode: {{ if .Values.bbr.supportedEvents.requestTrailers }}"SEND"{{ else }}"SKIP"{{ end }}
              response_trailer_mode: {{ if .Values.bbr.supportedEvents.responseTrailers }}"SEND"{{ else }}"SKIP"{{ end }}
            grpc_service:
              envoy_grpc:
                cluster_name: outbound|{{ .Values.bbr.port }}||{{ .Values.bbr.name }}.{{ .Values.bbr.namespace }}.svc.cluster.local
    # ─────────────────────────────────────────────────────────────────
    # Passive outlier detection for the BBR ext_proc upstream cluster.
    #
    # Istio auto-generates the
    # `outbound|{{ .Values.bbr.port }}||{{ .Values.bbr.name }}.{{ .Values.bbr.namespace }}.svc.cluster.local`
    # cluster the ext_proc filter dials. This CLUSTER patch MERGEs
    # `outlier_detection` onto it so a BBR replica that starts erroring is
    # ejected from the load-balancing set and in-flight requests fail over
    # to healthy replicas instead of tripping the fail-closed
    # `502 bbr_unavailable` path. The Kubernetes gRPC readiness probe is the
    # complementary ACTIVE health check.
    #
    # `max_ejection_percent` stays < 100 so outlier detection can never
    # eject every replica at once: `502 bbr_unavailable` only fires when ALL
    # replicas are genuinely unhealthy.
    #
    # Scoped to this namespace's Gateway pod via the workloadSelector above.
    # ─────────────────────────────────────────────────────────────────
    - applyTo: CLUSTER
      match:
        context: GATEWAY
        cluster:
          service: {{ .Values.bbr.name }}.{{ .Values.bbr.namespace }}.svc.cluster.local
          portNumber: {{ .Values.bbr.port }}
      patch:
        operation: MERGE
        value:
          outlier_detection:
            consecutive_gateway_failure: {{ .Values.bbr.outlierDetection.consecutiveGatewayFailure }}
            enforcing_consecutive_gateway_failure: 100
            consecutive_5xx: {{ .Values.bbr.outlierDetection.consecutive5xx }}
            enforcing_consecutive_5xx: 100
            # Treat ext_proc connect/stream failures (local-origin
            # errors) as eject-worthy, not just upstream 5xx.
            split_external_local_origin_errors: true
            consecutive_local_origin_failure: {{ .Values.bbr.outlierDetection.consecutiveGatewayFailure }}
            enforcing_consecutive_local_origin_failure: 100
            interval: {{ .Values.bbr.outlierDetection.interval | quote }}
            base_ejection_time: {{ .Values.bbr.outlierDetection.baseEjectionTime | quote }}
            max_ejection_percent: {{ .Values.bbr.outlierDetection.maxEjectionPercent }}
