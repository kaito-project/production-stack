apiVersion: v2
name: modelharness
description: |
  Per-namespace shared resources for production-stack workloads. One
  modelharness release per workload namespace provisions the artifacts
  every model deployment in that namespace shares: the Istio Gateway,
  the catch-all HTTPRoute (forwards unknown-model requests to the
  cluster-shared model-not-found Service via a ReferenceGrant), and —
  when enabled — the AuthorizationPolicy + APIKey CR that wire the
  Gateway into the cluster-wide apikey-ext-authz CUSTOM provider. The
  shared model-not-found Service itself is installed once per cluster
  by the E2E install script.
type: application
version: 0.1.0
appVersion: "0.1.0"
