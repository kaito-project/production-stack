# namespace is the workload namespace that owns these shared resources.
# Defaults to .Release.Namespace when empty.
namespace: ""

# manageNamespace controls whether the chart renders the workload
# Namespace object (stamped with the
# `productionstack.kaito.sh/managed-by: modelharness` discovery label the
# productionstack-status-reporter selects on). Rendered only when the
# release is installed into a management namespace distinct from the
# workload namespace (`namespace` is set and differs from
# `.Release.Namespace`); otherwise Helm owns the Namespace and the
# installer stamps the label at creation time. See
# templates/namespace.yaml.
manageNamespace: true

# gatewayClassName is the GatewayClass the per-namespace Gateway binds
# to. MUST be non-empty (enforced by values.schema.json). Defaults to
# Istio's "istio" GatewayClass.
gatewayClassName: istio

# gatewayName is the per-namespace Istio Gateway resource name. When
# empty (the default), the chart derives "<namespace>-gw" so the Gateway
# name self-identifies the workload namespace it serves while staying
# distinct from the namespace name. Override only when you need a
# business-specific name (e.g. a shared / multi-tenant cluster). All
# HTTPRoutes (the catch-all here plus the per-deployment HTTPRoutes from
# charts/modeldeployment) parent this Gateway. The Gateway's Service
# follows Istio's "<gatewayName>-istio" convention.
gatewayName: ""

# gatewayPort is the HTTP listener port on the Gateway.
gatewayPort: 80

# gatewayClassName is the GatewayClass the per-namespace Gateway binds
# to. The default `istio` matches the GatewayClass from a vanilla Istio
# install (e2e kind clusters). On the AKS Istio add-on with App Routing
# the class is `approuting-istio` (controllerName
# `istio.aks.azure.com/gateway-controller`) — set this value to match
# whatever class your controller exposes.
gatewayClassName: istio

# bbr wires the cluster-wide Body-Based Router (BBR) into THIS
# namespace's Gateway. BBR runs as a singleton installed by
# charts/productionstack/charts/body-based-routing; this chart only
# renders the dataplane EnvoyFilter (templates/envoyfilter-bbr.yaml)
# that injects BBR's ext_proc into the Gateway HCM, scoped to the
# Gateway pod. The BBR Service is reached by its cluster FQDN, so
# `name`/`namespace`/`port` below MUST match wherever BBR was installed.
bbr:
  # BBR Service name.
  name: body-based-router

  # Namespace BBR's Deployment/Service run in (the umbrella release
  # namespace by default).
  namespace: kaito-system

  # BBR ext_proc gRPC port.
  port: 9004

  # Which HTTP lifecycle events Envoy forwards to BBR. Only
  # requestHeaders + requestBody are required for model extraction; the
  # rest are kept on for upstream parity.
  supportedEvents:
    requestHeaders: true
    requestBody: true
    requestTrailers: true
    responseHeaders: true
    responseBody: true
    responseTrailers: true

  envoyFilter:
    # Filter-chain placement. Anchor on Istio's auto-injected
    # InferencePool ext_proc filter and INSERT_BEFORE so BBR injects
    # `X-Gateway-Model-Name` before the InferencePool/EPP ext_proc and
    # the HTTPRoute match run. Final chain:
    #   istio.metadata_exchange → bbr → ext_proc (InferencePool) → … → router
    operation: INSERT_BEFORE
    anchorSubFilter: envoy.filters.http.ext_proc

  # Passive outlier detection for the BBR ext_proc upstream cluster.
  # A CLUSTER patch MERGEs `outlier_detection` onto the auto-generated
  # `outbound|<port>||body-based-router...` cluster so a BBR replica that
  # starts erroring is ejected and in-flight requests fail over to
  # healthy replicas instead of tripping the fail-closed
  # `502 bbr_unavailable` path. The gRPC readiness probe is the
  # complementary ACTIVE check. `maxEjectionPercent` MUST stay < 100 so
  # all replicas can never be ejected at once — `502 bbr_unavailable`
  # then only fires when every replica is genuinely unhealthy.
  outlierDetection:
    # Eject after this many consecutive gateway (connect / stream)
    # failures — the dominant failure mode for a down/hung upstream.
    consecutiveGatewayFailure: 3
    # Eject after this many consecutive 5xx-mapped responses.
    consecutive5xx: 3
    # How often Envoy sweeps for outliers / considers un-ejecting.
    interval: 5s
    # How long an ejected host stays out before it is tried again
    # (grows with the ejection count).
    baseEjectionTime: 30s
    # Hard cap on the share of the cluster that may be ejected at
    # once. Keep < 100 (see note above).
    maxEjectionPercent: 50

# Catch-all "model not found" responses are produced by an Envoy
# direct_response patched onto the Gateway HCM via the
# `model-not-found-direct` EnvoyFilter (templates/envoyfilter-not-found.yaml).
# No backend Pod / Service / ReferenceGrant is required.

# auth toggles the per-namespace API-key authentication artifacts. When
# enabled, the chart renders:
#   - APIKey CR: triggers the apikey-operator to reconcile a Secret named
#     `llm-api-key` holding the bearer token clients send.
#   - EnvoyFilter `apikey-ext-authz`: inserts
#     `envoy.filters.http.ext_authz` into THIS namespace's Gateway pod,
#     pointing at the cluster-wide apikey-authz gRPC Service installed by
#     the `llm-gateway-apikey` subchart of `productionstack`. Auth scope
#     is per-namespace — flip `auth.enabled` on per workload namespace
#     that needs API-key enforcement.
auth:
  enabled: false
  # apiKeyName is the name of the APIKey CR rendered when auth.enabled.
  apiKeyName: "default"
  # Cluster-wide apikey-authz gRPC Service the per-namespace EnvoyFilter
  # targets. Defaults match the `llm-gateway-apikey` subchart.
  extAuthz:
    serviceName: apikey-authz
    serviceNamespace: llm-gateway-auth
    grpcPort: 9001
    # gRPC call timeout for the ext_authz check. ext_authz fires once per
    # request on headers only (not in the streaming body path), so a low
    # single-digit-second budget is safe. The chart renders
    # `failure_mode_allow: false`, so a hung/slow apikey-authz fails the
    # request fast rather than silently letting traffic through.
    timeout: 5s
    # How ext_authz is inserted into the gateway HTTP filter chain.
    #   INSERT_FIRST — head of the chain (default). Works without any
    #                  RequestAuthentication on the Gateway.
    #   INSERT_AFTER — after jwt_authn so JWT claims are populated in
    #                  the ext_authz request metadata. Use when a
    #                  RequestAuthentication is configured on this
    #                  Gateway.
    operation: INSERT_FIRST
    # Envoy filter metadata namespaces forwarded to the ext_authz
    # server. Set to ["envoy.filters.http.jwt_authn"] when
    # operation=INSERT_AFTER to forward JWT claims to apikey-authz.
    metadataContextNamespaces: []

# networkPolicy toggles the per-namespace CiliumNetworkPolicy that
# locks down East-West ingress to inference workloads (EPP,
# KAITO-rendered inference, shadow pods) while leaving the per-namespace
# Istio Gateway pod and user-deployed pods unaffected. When enabled, the
# chart renders CiliumNetworkPolicy `inference-pods-ingress`, which
# selects pods with the `kaito.sh/owned-by: modeldeployment` label and
# allows ingress from the same namespace plus `allowedIngressNamespaces`;
# any other ingress is dropped by Cilium's implicit default-deny. CNP is
# used rather than networking.k8s.io/v1 NetworkPolicy because the AKS
# Cilium dataplane intermittently fails to compile K8s NetworkPolicies
# for pre-existing pods. See templates/networkpolicies.yaml.
networkPolicy:
  enabled: true

  # allowedIngressNamespaces grants cross-namespace ingress to the
  # inference pods in this workload namespace. Each entry renders a
  # `fromEndpoints` clause keyed off the `k8s:io.kubernetes.pod.namespace`
  # label. Use it to permit control-plane / metric-scraper components
  # outside the namespace (e.g. `keda-kaito-scaler` in `keda` reaching
  # vLLM / InferencePool metric endpoints). An empty list keeps strict
  # per-namespace isolation.
  allowedIngressNamespaces:
    - keda
    - kaito-system
    - kube-system
    - monitoring

# cloudprovider selects which cloud provider's integrations render.
# When `cloudprovider=""` (the default), the non-cloud
# `templates/gateway.yaml` renders and cloud-specific templates
# under `templates/<provider>/` render nothing. When
# `cloudprovider=azure`, `templates/gateway.yaml` renders nothing
# and `templates/azure/*.yaml` render the Azure variants instead
# (Gateway with default-domain HTTPS listener + ReferenceGrant).
#
# Exactly one variant renders for a given cloudprovider — no inline
# `{{ if }}` blocks inside spec bodies. The `azure` subtree below is
# ignored unless `cloudprovider=azure`.
cloudprovider: ""

# azure groups every Azure-specific value used by templates under
# `templates/azure/`. Consumed only when `cloudprovider=azure`.
azure:
  # defaultDomain wires THIS namespace's Gateway into the cluster's AKS
  # Application Routing "default domain". Pure consumer of the
  # cluster-wide DefaultDomainCertificate rendered by charts/productionstack
  # — this chart does NOT render its own DDC because one Azure-issued
  # wildcard cert covers the whole cluster and N per-namespace DDCs
  # would drive N redundant reconciliation loops against the same
  # underlying Azure cert.
  #
  # The listener hostname is composed as
  # `<workload-namespace>.<azure-default-domain>`. The namespace prefix
  # guarantees a unique subdomain per modelharness release on the same
  # cluster; the App-Routing operator's `default-domain-dns`
  # ClusterExternalDNS then auto-publishes an A record for that name.
  #
  # The chart also renders a ReferenceGrant into `secretRef.namespace`
  # authorising THIS workload namespace's Gateway to cross-namespace-
  # reference the shared TLS Secret. Gateway API rejects cross-namespace
  # certificateRefs without a matching ReferenceGrant in the Secret's
  # namespace. Each modelharness release brings its own grant so there
  # is no cross-chart coordination.
  #
  # Prerequisites (validated by the caller, not the chart):
  #   - `gatewayClassName: approuting-istio` above. The Istio
  #     service-mesh add-on's `istio` class does NOT reconcile
  #     default-domain TLS.
  #   - charts/productionstack installed with cloudprovider=azure
  #     and azure.defaultDomain.enabled=true so the DDC and its
  #     Secret exist.
  #   - The Helm caller has RBAC to create/patch/delete
  #     ReferenceGrants in `secretRef.namespace`.
  defaultDomain:
    # zoneName is the cluster's AKS-issued default-domain zone (WITHOUT
    # the `*.` prefix). Required when cloudprovider=azure — the template
    # `fail`s otherwise. Fetch with:
    #   az aks show -g $RG -n $CLUSTER \
    #     --query 'ingressProfile.webAppRouting.defaultDomain.domainName' \
    #     -o tsv
    # Per-cluster constant; use the same value for every modelharness
    # release on the same cluster.
    zoneName: ""

    # secretRef points at the TLS Secret reconciled by the App-Routing
    # operator from the productionstack DDC. Defaults match
    # productionstack's DDC pinning to kube-system with secretName=cert;
    # override both together if productionstack was installed with
    # different values.
    secretRef:
      name: "cert"
      namespace: "kube-system"

    # httpsPort is the HTTPS listener port. AKS App-Routing's managed
    # LoadBalancer only reconciles 80/443 by default; don't change
    # without matching load-balancer customisation.
    httpsPort: 443

    # listenerName is the Gateway listener name. Must be unique within
    # `spec.listeners`. Kept short and stable so any
    # `istio-gateway-class-defaults` per-listener overrides key off a
    # predictable name.
    listenerName: "https-default"
