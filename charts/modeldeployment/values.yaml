# Required inputs.

# name is the deployment name. It is used as:
#   - the Helm release / InferenceSet name
#   - the prefix for the InferencePool / EPP / HTTPRoute object names
#   - the value of the inferenceset.kaito.sh/created-by selector used by
#     the InferencePool to find inference (shadow) pods
#   - the value of the X-Gateway-Model-Name header matched by the HTTPRoute
#     (i.e. the value sent in the `model` field of OpenAI-style requests).
#     This lets a single namespace host multiple deployments of the same
#     preset model under distinct deployment names.
# Defaults to .Release.Name when empty.
name: ""

# namespace is the target namespace. Defaults to .Release.Namespace when empty.
namespace: ""

# model is the inference preset name, used only as
# spec.template.inference.preset.name on the InferenceSet. It is independent
# of `name` — multiple deployments may share the same preset model. Required.
model: ""

# instanceType is the VM instance type used for the underlying nodes.
instanceType: "Standard_NV36ads_A10_v5"

# replicas is the desired number of InferenceSet replicas. Also wired to the
# scaledobject.kaito.sh/min-replicas annotation.
replicas: 1

# enableScaling toggles KAITO ScaledObject auto-provisioning. When false,
# none of the scaledobject.kaito.sh/* annotations are rendered on the
# InferenceSet, and the entire `scaling` block below is ignored.
enableScaling: false

# maxReplicas is the upper bound for autoscaling. Only used when
# enableScaling is true. Wired to the scaledobject.kaito.sh/max-replicas
# annotation. `replicas` above doubles as the lower bound, wired to
# scaledobject.kaito.sh/min-replicas.
maxReplicas: 3

# scaling holds the composite (multi-metric) autoscaling configuration
# consumed by keda-kaito-scaler. It is read only when enableScaling is
# true. The `metrics` list is rendered as a single
# `scaledobject.kaito.sh/metrics` annotation (a YAML list); keda-kaito-scaler
# builds a single KEDA ScaledObject whose scalingModifiers formula combines
# them under a conservative AND policy — scale up by one replica only when
# EVERY metric is above its upThreshold (and newly added pods are Ready),
# scale down by one replica only when EVERY metric is below its downThreshold,
# otherwise hold. Each step is capped at ±1 replica per cooldown to protect
# expensive GPU capacity. A single metric is fully supported; it simply
# yields a one-signal formula.
scaling:
  # metrics is the ordered list of scaling signals. MUST contain at least
  # one entry when enableScaling is true.
  metrics:
      # name is the Prometheus metric family name exposed by each inference
      # (model server) pod. Rendered as the `name` field of a
      # scaledobject.kaito.sh/metrics entry.
    - name: "vllm:num_requests_waiting"
      # type is the aggregation applied to the metric; it MUST keep the
      # signal replica-count independent:
      #   gauge     -> per-replica average across pods
      #   histogram -> per-pod quantile
      # Rendered as the `type` field of a scaledobject.kaito.sh/metrics
      # entry. Defaults to gauge when empty.
      type: "gauge"
      # upThreshold is the per-replica scale-up threshold (float, quoted).
      # REQUIRED when enableScaling is true — left empty by default so the
      # caller MUST set it; an empty value rejects the Helm install.
      # Rendered as the `upthreshold` field of a scaledobject.kaito.sh/metrics
      # entry.
      upThreshold: ""
      # downThreshold is the per-replica scale-down threshold (float,
      # quoted). MUST be strictly less than upThreshold. REQUIRED when
      # enableScaling is true — left empty by default so the caller MUST
      # set it; an empty value rejects the Helm install. Rendered as the
      # `downthreshold` field of a scaledobject.kaito.sh/metrics entry.
      downThreshold: ""
      # quantile is the target quantile in (0, 1] for histogram metrics;
      # ignored for gauge. Optional; empty lets keda-kaito-scaler apply its
      # 0.95 default. Rendered as the `quantile` field of a
      # scaledobject.kaito.sh/metrics entry.
      quantile: ""
      # p95 request queue time (histogram). Combined with the metric above
      # under the AND policy: scale up only when both are above their
      # upThresholds, scale down only when both are below their
      # downThresholds. upThreshold / downThreshold are REQUIRED (empty by
      # default) and reject the install when unset.
    - name: "vllm:request_queue_time_seconds"
      type: "histogram"
      upThreshold: ""
      downThreshold: ""
      quantile: "0.95"

  # evaluationWindow is the scale-up stabilization window in seconds.
  # Optional; empty lets keda-kaito-scaler apply its 60s default. Wired to
  # scaledobject.kaito.sh/evaluationwindow.
  evaluationWindow: 60
  # scaleUpCooldown is the minimum seconds between scale-up steps.
  # Optional; empty lets keda-kaito-scaler apply its 300s default. Wired to
  # scaledobject.kaito.sh/scaleupcooldown.
  scaleUpCooldown: 300
  # scaleDownCooldown is the minimum seconds between scale-down steps.
  # Optional; empty lets keda-kaito-scaler apply its 300s default. Wired to
  # scaledobject.kaito.sh/scaledowncooldown.
  scaleDownCooldown: 300

# enableBenchmark toggles KAITO benchmark runs for this InferenceSet. When
# false, the `kaito.sh/disable-benchmark: "true"` annotation is stamped on
# the InferenceSet so the KAITO controller skips benchmark provisioning.
enableBenchmark: true

# performanceMode, when set, stamps the `kaito.sh/performance-mode: <value>`
# annotation on the InferenceSet template so the KAITO controller applies
# the corresponding performance profile. Empty (the default) omits the
# annotation and the controller falls back to its own default ("balanced").
# Valid values are "balanced" (default), "interactivity", and "throughput":
#   - "interactivity": optimizes for low per-request latency (fine-grained
#     CUDA graphs, latency-oriented kernels, smaller batch sizes).
#   - "balanced": sensible trade-off between latency and throughput.
#   - "throughput": maximizes aggregate tokens/sec (larger CUDA graphs, more
#     aggressive batching, throughput-oriented kernels).
performanceMode: ""

# autoUpgrade configures KAITO's automatic base image upgrades for this
# InferenceSet, rendered as spec.autoUpgrade. KAITO ships the vLLM base
# image embedded in the controller; when the controller is upgraded to a
# release bundling a newer base image, existing replicas keep running the
# old image until recreated. With auto-upgrade enabled, the controller
# detects the version drift and rolls replicas onto the new image one at a
# time — waiting for each replica to become Ready before moving to the
# next — keeping the service available throughout the rollout.
#
# NOTE: auto-upgrade ALSO requires the `enableBaseImageAutoUpgrade` feature
# gate to be enabled on the KAITO controller (off by default). This chart
# value only opts the individual InferenceSet in; without the feature gate
# the controller ignores spec.autoUpgrade.
autoUpgrade:
  # enabled toggles spec.autoUpgrade.enabled. When false (the default),
  # the entire spec.autoUpgrade block is omitted and replicas stay pinned
  # to the base image they were created with until manually recreated.
  enabled: false
  # maintenanceWindow optionally restricts when rollouts may begin. When
  # `schedule` is empty (the default), upgrades may start at any time.
  # When set, the controller only starts upgrading replicas while the
  # current time is inside the window; an upgrade already in progress is
  # allowed to finish even if the window closes, and the next replica
  # waits for the following window. Consumed only when enabled is true.
  maintenanceWindow:
    # schedule is a 5-field cron expression (UTC) marking the start of
    # each maintenance window, e.g. "0 2 * * 6" (every Saturday at 02:00
    # UTC). Empty (the default) lets upgrades start at any time; the
    # maintenanceWindow block is omitted entirely.
    schedule: ""
    # duration is how long the window stays open once it opens, e.g.
    # "4h". Empty lets the KAITO controller apply its 4h default. Ignored
    # when `schedule` is empty.
    duration: ""

# gatewayName is the Gateway resource the HTTPRoute attaches to. When
# empty (the default), the chart derives it as "<namespace>-gw" so the
# rendered HTTPRoute parents the per-namespace Gateway provisioned by
# charts/modelharness. Override only when you need to attach to a
# Gateway with a business-specific name.
gatewayName: ""

# ----------------------------------------------------------------------------
# Endpoint Picker (EPP) configuration.
#
# This chart inlines the GAIE InferencePool + EPP artifacts that KAITO
# normally provisions via Flux + the upstream
# `oci://registry.k8s.io/gateway-api-inference-extension/charts/inferencepool`
# chart. The EPP runs with TLS disabled (`--secure-serving=false`), so the
# Istio Gateway can reach it over plaintext gRPC without a DestinationRule.
# ----------------------------------------------------------------------------
epp:
  image:
    repository: "mcr.microsoft.com/oss/v2/llm-d/llm-d-inference-scheduler"
    tag: "v0.7.1"
    pullPolicy: "IfNotPresent"
  replicas: 1
  # modelServerPort is the port exposed by the inference (model server) pods.
  # Must match KAITO's PortInferenceServer (5000).
  modelServerPort: 5000
  # extProcPort is the EPP gRPC ext_proc port consumed by the Gateway.
  extProcPort: 9002
  # healthPort is the EPP gRPC health-check port.
  healthPort: 9003
  # metricsPort is the EPP HTTP metrics port.
  metricsPort: 9090
  # logVerbosity passed as `--v=<n>`.
  logVerbosity: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  # tolerations applied to the EPP pod. Empty by default; the caller is
  # expected to pass any required tolerations (e.g. a CriticalAddonsOnly
  # toleration for nodes reserved for critical add-ons).
  tolerations: []
  # modelServerSelector selects the inference pods this InferencePool routes
  # to. KAITO labels each inference pod with
  # `inferenceset.kaito.sh/created-by: <inferenceset-name>` and (for stateful
  # deployments) restricts traffic to the pod-index 0 leader.
  modelServerSelector:
    inferenceset.kaito.sh/created-by: ""   # auto-filled with .Values.name when empty
    apps.kubernetes.io/pod-index: "0"

# cloudprovider selects which cloud provider's integrations render.
# When `cloudprovider=""` (the default), the non-cloud
# `templates/httproute.yaml` renders (header-only routing, no
# hostnames). When `cloudprovider=azure`, `templates/httproute.yaml`
# renders nothing and `templates/azure/httproute.yaml` renders instead
# (adds `hostnames: [<namespace>.<zoneName>]` matching the modelharness
# Gateway's Azure default-domain HTTPS listener).
#
# Exactly one variant renders for a given cloudprovider — no inline
# `{{ if }}` blocks inside spec bodies. The `azure` subtree below is
# ignored unless `cloudprovider=azure`.
cloudprovider: ""

# azure groups every Azure-specific value used by templates under
# `templates/azure/`. Consumed only when `cloudprovider=azure`.
azure:
  # defaultDomain drives the `hostnames` field on
  # templates/azure/httproute.yaml so it attaches to the modelharness
  # Gateway's HTTPS default-domain listener. The HTTPRoute carries
  # `hostnames: ["<workload-namespace>.<zoneName>"]` — the SAME
  # hostname the modelharness Gateway listener uses — so Istio
  # attaches the route to that listener and requests on the
  # default-domain hostname reach this InferencePool.
  #
  # Header-based routing (X-Gateway-Model-Name matching this
  # deployment's `name`) still differentiates multiple deployments
  # sharing the hostname within the namespace.
  #
  # `zoneName` MUST match the value used in the corresponding
  # `modelharness` release's `azure.defaultDomain.zoneName` in the
  # same namespace.
  defaultDomain:
    # zoneName is the cluster's AKS-issued default-domain zone (without
    # the `*.` prefix). Required when cloudprovider=azure — the template
    # `fail`s otherwise. Same value as used in the corresponding
    # modelharness (and productionstack) release. Fetch with:
    #   az aks show -g $RG -n $CLUSTER \
    #     --query 'ingressProfile.webAppRouting.defaultDomain.domainName' \
    #     -o tsv
    zoneName: ""
