# Required inputs.

# name is the deployment name. It is used as:
#   - the Helm release / InferenceSet name
#   - the prefix for the InferencePool / EPP / HTTPRoute object names
#   - the value of the inferenceset.kaito.sh/created-by selector used by
#     the InferencePool to find inference (shadow) pods
#   - the value of the X-Gateway-Model-Name header matched by the HTTPRoute
#     (i.e. the value sent in the `model` field of OpenAI-style requests).
#     This lets a single namespace host multiple deployments of the same
#     preset model under distinct deployment names.
# Defaults to .Release.Name when empty.
name: ""

# namespace is the target namespace. Defaults to .Release.Namespace when empty.
namespace: ""

# model is the inference preset name, used only as
# spec.template.inference.preset.name on the InferenceSet. It is independent
# of `name` — multiple deployments may share the same preset model. Required.
model: ""

# instanceType is the VM instance type used for the underlying nodes.
instanceType: "Standard_NV36ads_A10_v5"

# replicas is the desired number of InferenceSet replicas. Also wired to the
# scaledobject.kaito.sh/min-replicas annotation.
replicas: 1

# enableScaling toggles KAITO ScaledObject auto-provisioning. When false,
# none of the scaledobject.kaito.sh/* annotations are rendered on the
# InferenceSet, and `maxReplicas` / `scalingThreshold` are ignored.
enableScaling: false

# maxReplicas is the upper bound for autoscaling. Only used when
# enableScaling is true. Wired to the scaledobject.kaito.sh/max-replicas
# annotation.
maxReplicas: 3

# scalingThreshold is the queue depth threshold used by the ScaledObject.
# Only used when enableScaling is true. Wired to the
# scaledobject.kaito.sh/threshold annotation.
scalingThreshold: 10

# gatewayName is the Gateway resource the HTTPRoute attaches to. When
# empty (the default), the chart derives it as "<namespace>-gw" so the
# rendered HTTPRoute parents the per-namespace Gateway provisioned by
# charts/modelharness. Override only when you need to attach to a
# Gateway with a business-specific name.
gatewayName: ""

# ----------------------------------------------------------------------------
# Endpoint Picker (EPP) configuration.
#
# This chart inlines the GAIE InferencePool + EPP artifacts that KAITO
# normally provisions via Flux + the upstream
# `oci://registry.k8s.io/gateway-api-inference-extension/charts/inferencepool`
# chart. The EPP runs with TLS disabled (`--secure-serving=false`), so the
# Istio Gateway can reach it over plaintext gRPC without a DestinationRule.
# ----------------------------------------------------------------------------
epp:
  image:
    repository: "mcr.microsoft.com/oss/v2/llm-d/llm-d-inference-scheduler"
    tag: "v0.7.1"
    pullPolicy: "IfNotPresent"
  replicas: 1
  # modelServerPort is the port exposed by the inference (model server) pods.
  # Must match KAITO's PortInferenceServer (5000).
  modelServerPort: 5000
  # extProcPort is the EPP gRPC ext_proc port consumed by the Gateway.
  extProcPort: 9002
  # healthPort is the EPP gRPC health-check port.
  healthPort: 9003
  # metricsPort is the EPP HTTP metrics port.
  metricsPort: 9090
  # logVerbosity passed as `--v=<n>`.
  logVerbosity: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  # modelServerSelector selects the inference pods this InferencePool routes
  # to. KAITO labels each inference pod with
  # `inferenceset.kaito.sh/created-by: <inferenceset-name>` and (for stateful
  # deployments) restricts traffic to the pod-index 0 leader.
  modelServerSelector:
    inferenceset.kaito.sh/created-by: ""   # auto-filled with .Values.name when empty
    apps.kubernetes.io/pod-index: "0"

# ----------------------------------------------------------------------------
# Policy resync hook.
#
# Renders a post-install/post-upgrade Helm Job that works around an AKS
# Cilium reconcile race: cilium-agent does not re-walk EXISTING endpoints
# when a new CiliumNetworkPolicy lands, so a pod created before the
# modelharness CNP is compiled may stay non-enforcing. The hook briefly
# stamps + strips a throwaway label on every policy-selected pod in this
# release's namespace, which fires the endpoint-update event that gets
# the agent to re-evaluate the endpoint against the already-installed
# policy.
#
# See charts/modeldeployment/templates/policy-resync-job.yaml for the
# full rationale and the upstream-bug retirement plan.
# ----------------------------------------------------------------------------
policyResync:
  # enabled toggles the post-install/post-upgrade Job. Leave on for any
  # cluster running the AKS Cilium fork; safe to disable on clusters
  # whose cilium-agent honours status.nodes acks (the Job is a no-op
  # there but still consumes a few CPU-seconds at install time).
  enabled: true

  # waitTimeoutSeconds bounds how long the Job will poll for the EPP
  # pods to reach Ready before giving up. The Job runs inside Helm's
  # post-install window (default 5m), so this must be well under 300s
  # to leave headroom for image pull + pod scheduling on a cold node.
  # We deliberately do NOT wait for KAITO-provisioned inference pods —
  # those come up minutes later after node provisioning and will see
  # the modelharness CNP at endpoint registration time, so they're not
  # subject to the install-time AKS Cilium race.
  waitTimeoutSeconds: 180

  image:
    # Official upstream kubectl image, published by sig-release alongside
    # the kubectl binary itself. Avoids the Bitnami Legacy deprecation
    # (docker.io/bitnami/kubectl tags started returning manifest-not-found
    # after the August 2025 catalog migration). The `vX.Y.Z` tag matches
    # the kubectl release; we pin a recent stable rather than `latest`
    # so a kubectl release doesn't silently change Job behaviour.
    repository: "registry.k8s.io/kubectl"
    tag: "v1.31.0"
    pullPolicy: "IfNotPresent"
