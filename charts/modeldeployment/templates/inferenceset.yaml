{{- if .Values.enableScaling }}
{{- if lt ((.Values.maxReplicas | int)) ((.Values.replicas | int)) }}
{{- fail (printf "modeldeployment: maxReplicas (%d) must be >= replicas (%d) when enableScaling is true" (.Values.maxReplicas | int) (.Values.replicas | int)) }}
{{- end }}
{{- end }}
apiVersion: kaito.sh/v1alpha1
kind: InferenceSet
metadata:
  name: {{ include "modeldeployment.name" . }}
  namespace: {{ include "modeldeployment.namespace" . }}
  labels:
    {{- include "modeldeployment.labels" . | nindent 4 }}
  {{- if .Values.enableScaling }}
  annotations:
    scaledobject.kaito.sh/auto-provision: "true"
    scaledobject.kaito.sh/threshold: {{ .Values.scalingThreshold | quote }}
    scaledobject.kaito.sh/min-replicas: {{ .Values.replicas | quote }}
    scaledobject.kaito.sh/max-replicas: {{ .Values.maxReplicas | quote }}
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  labelSelector:
    matchLabels:
      apps: {{ include "modeldeployment.name" . }}
  template:
    metadata:
      labels:
        {{/*
        Stamp the production-stack ownership label into the InferenceSet
        template metadata. The upstream KAITO InferenceSet controller
        clones template.metadata.labels onto every child Workspace it
        renders, which in turn propagates the label onto the inference
        workload pods. The modelharness NetworkPolicies positively select
        on this label — without it, KAITO-rendered inference pods would
        not match `default-deny-ingress` / `allow-inference-traffic` and
        cross-namespace ingress to them would silently succeed.
        */}}
        {{- include "modeldeployment.ownerLabel" . | nindent 8 }}
    resource:
      instanceType: {{ .Values.instanceType | quote }}
    inference:
      preset:
        name: {{ .Values.model | quote }}
        {{- if .Values.presetImage }}
        presetOptions:
          image: {{ .Values.presetImage | quote }}
        {{- end }}
