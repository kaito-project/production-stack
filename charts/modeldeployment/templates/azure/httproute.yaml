{{- if eq .Values.cloudprovider "azure" }}
{{- if not .Values.azure.defaultDomain.zoneName }}
{{- fail "cloudprovider=\"azure\" requires azure.defaultDomain.zoneName. Use the SAME value as the corresponding modelharness release's azure.defaultDomain.zoneName. Fetch with: az aks show -g $RG -n $CLUSTER --query 'ingressProfile.webAppRouting.defaultDomain.domainName' -o tsv" }}
{{- end }}
# HTTPRoute with `hostnames` set to match the modelharness Gateway's
# Azure default-domain HTTPS listener. Rendered only when
# `cloudprovider=azure`; the non-Azure sibling `templates/httproute.yaml`
# (no hostnames, header-only routing) renders otherwise.
#
# `hostnames` is required so Istio attaches this HTTPRoute to the
# host-scoped HTTPS listener — without a matching hostname, the
# Istio Gateway controller rejects the route from that listener even
# though the parentRef is correct. Header-based routing
# (X-Gateway-Model-Name matching this deployment's `name`) still
# differentiates multiple deployments sharing the hostname within
# the namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "modeldeployment.httpRouteName" . }}
  namespace: {{ include "modeldeployment.namespace" . }}
  labels:
    {{- include "modeldeployment.labels" . | nindent 4 }}
    {{- include "modeldeployment.identifyingLabels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "modeldeployment.gatewayName" . | quote }}
  hostnames:
    - {{ printf "%s.%s" (include "modeldeployment.namespace" .) (.Values.azure.defaultDomain.zoneName | trimPrefix ".") | quote }}
  rules:
    - matches:
        # Two match entries are OR'd by the Gateway API spec: a request is
        # routed to this deployment if EITHER the BBR-injected routed-model
        # header (X-Gateway-Model-Name) OR the base-model header
        # (X-Gateway-Base-Model-Name, used for adapter / LoRA requests where
        # the client-visible model differs from the underlying base) matches
        # this deployment's name.
        - headers:
            - type: Exact
              name: X-Gateway-Model-Name
              value: {{ include "modeldeployment.name" . | quote }}
          path:
            type: PathPrefix
            value: /
        - headers:
            - type: Exact
              name: X-Gateway-Base-Model-Name
              value: {{ include "modeldeployment.name" . | quote }}
          path:
            type: PathPrefix
            value: /
      filters:
        # Pass-through error-source stamp (§2.2, modeldeployment pass-through
        # row): any non-error or vLLM-native response (e.g. a 429 rate-limit)
        # is proxied back unchanged except for this header, which names the
        # inference pod as the responsible component. Error responses Envoy
        # generates locally (model_unavailable / epp_unavailable / the gateway
        # and bbr/authz codes) are rewritten by the consolidated per-namespace
        # envoyfilter-outage-reply local_reply mappers (charts/modelharness),
        # which OVERWRITE this header with the correct at-fault source.
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: x-kaito-error-source
                value: inferenceset
      backendRefs:
        - name: {{ include "modeldeployment.inferencePoolName" . }}
          group: inference.networking.k8s.io
          kind: InferencePool
{{- end }}
