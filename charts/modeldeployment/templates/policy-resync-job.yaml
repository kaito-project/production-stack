{{- if .Values.policyResync.enabled }}
{{/*
Post-install/post-upgrade Helm hook that works around the AKS Cilium
reconcile race: cilium-agent's selector cache does not re-walk EXISTING
endpoints when a new CiliumNetworkPolicy is added, so a pod created
before the modelharness CNP is compiled may stay non-enforcing forever
(its CiliumEndpoint reports status.policy.ingress.enforcing=false and
ingress flows unrestricted). The agent DOES re-evaluate when an
endpoint's labels change — so we briefly stamp and remove a throwaway
label on every pod the CNP should match, which forces the per-endpoint
re-match against the already-installed policy.

Why a Job (not a controller):
  Helm install blocks until the post-install hook completes, so by the
  time `helm install modeldeployment` returns, every policy-selected
  pod in this release's namespace has been re-evaluated and is
  enforcing. The e2e suite (and any other "wait for ready then probe"
  consumer) gets correctness with zero new code paths. A controller
  would also cover scale-up / rollout births, but it's a much heavier
  lift; the long-term plan is to file the bug against the AKS Cilium
  fork and retire this hook once status.nodes ack is populated.

Why this chart (not modelharness):
  modelharness renders the CNP itself, so by the time any
  modeldeployment release runs, the policy is already on the API
  server. The pods the policy SELECTS (EPP, KAITO-rendered inference,
  shadow pods) are all owned by this chart's release, and they're the
  ones whose endpoint identity needs perturbation. Running the
  perturbation alongside the pods that need it keeps the blast radius
  scoped to this release.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "modeldeployment.name" . }}-policy-resync
  namespace: {{ include "modeldeployment.namespace" . }}
  labels:
    {{- include "modeldeployment.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "modeldeployment.name" . }}-policy-resync
  namespace: {{ include "modeldeployment.namespace" . }}
  labels:
    {{- include "modeldeployment.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "modeldeployment.name" . }}-policy-resync
  namespace: {{ include "modeldeployment.namespace" . }}
  labels:
    {{- include "modeldeployment.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "modeldeployment.name" . }}-policy-resync
    namespace: {{ include "modeldeployment.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "modeldeployment.name" . }}-policy-resync
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "modeldeployment.name" . }}-policy-resync
  namespace: {{ include "modeldeployment.namespace" . }}
  labels:
    {{- include "modeldeployment.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    {{/*
    Weight 10 runs the job after the SA/Role/RoleBinding above (weight 0)
    so the Job's ServiceAccount is bound before the pod starts. Helm
    sorts hooks by weight ascending and applies them in batches.
    */}}
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  {{/*
  backoffLimit kept low: a real failure (RBAC misconfigured, image
  unreachable, namespace gone) won't be fixed by retrying. The script
  itself does its own polling for pod readiness within a single Job
  attempt — see WAIT_DEADLINE below.
  */}}
  backoffLimit: 2
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        {{- include "modeldeployment.labels" . | nindent 8 }}
        app.kubernetes.io/component: policy-resync
      annotations:
        {{/*
        Skip Istio sidecar injection. The Job pod only talks to the
        kube-apiserver, and an injected proxy would block the Job from
        completing (the istio-proxy container never exits, so the Pod
        stays Running forever and the Job is reported as Active).
        */}}
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "modeldeployment.name" . }}-policy-resync
      containers:
        - name: resync
          image: "{{ .Values.policyResync.image.repository }}:{{ .Values.policyResync.image.tag }}"
          imagePullPolicy: {{ .Values.policyResync.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SELECTOR
              {{/*
              Matches the label modelharness's CiliumNetworkPolicy
              endpointSelector keys on. Every pod this chart renders
              (EPP via epp-deployment.yaml, inference/shadow pods via
              inferenceset.yaml -> InferenceSet template metadata)
              carries this label.
              */}}
              value: "kaito.sh/owned-by=modeldeployment"
            - name: WAIT_TIMEOUT_SECONDS
              value: {{ .Values.policyResync.waitTimeoutSeconds | quote }}
            - name: MIN_PODS
              {{/*
              Only wait for the EPP replicas. The AKS Cilium race bites
              endpoints that exist BEFORE the CNP is installed; KAITO-
              provisioned inference / shadow pods come up minutes later
              (after node provisioning) and will see the modelharness
              CNP at endpoint registration time, so they don't need
              perturbation. Waiting for inference pods here would also
              blow past Helm's default 5m install timeout and fail the
              whole release.
              */}}
              value: {{ .Values.epp.replicas | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "policy-resync: namespace=$NAMESPACE selector=$SELECTOR min_pods=$MIN_PODS"

              DEADLINE=$(( $(date +%s) + WAIT_TIMEOUT_SECONDS ))

              # Phase 1: poll until at least MIN_PODS matching pods report
              # Ready. We can't perturb an endpoint Cilium hasn't yet
              # registered, so waiting for PodReady ensures the
              # CiliumEndpoint object exists and an identity has been
              # allocated before we try to fire a label-change event.
              READY_PODS=""
              while [ "$(date +%s)" -lt "$DEADLINE" ]; do
                READY_PODS=$(kubectl -n "$NAMESPACE" get pods \
                  -l "$SELECTOR" \
                  -o 'jsonpath={range .items[*]}{@.metadata.name}{"|"}{range @.status.conditions[?(@.type=="Ready")]}{@.status}{end}{"\n"}{end}' \
                  | awk -F'|' '$2=="True"{print $1}')
                COUNT=$(printf "%s\n" "$READY_PODS" | grep -c . || true)
                if [ "$COUNT" -ge "$MIN_PODS" ]; then
                  echo "policy-resync: $COUNT pods Ready, proceeding"
                  break
                fi
                echo "policy-resync: $COUNT/$MIN_PODS Ready, waiting..."
                sleep 2
              done
              if [ -z "$READY_PODS" ]; then
                echo "policy-resync: no Ready pods matching $SELECTOR after ${WAIT_TIMEOUT_SECONDS}s — exiting failure" >&2
                exit 1
              fi

              # Phase 2: stamp+strip a transient label on each Ready pod.
              # The stamp fires an endpoint-update event in cilium-agent;
              # the strip restores the original label set so a later
              # operator that reconciles labels doesn't keep fighting us.
              TS=$(date +%s)
              for POD in $READY_PODS; do
                echo "policy-resync: perturbing pod/$POD"
                # Two-step add+remove via separate calls. A single JSON
                # patch with add+remove could be coalesced into a no-op
                # by the apiserver and never produce a Modified event;
                # two distinct PATCHes guarantee two events.
                kubectl -n "$NAMESPACE" label pod "$POD" \
                  "kaito.sh/policy-resync=$TS" --overwrite >/dev/null
                kubectl -n "$NAMESPACE" label pod "$POD" \
                  "kaito.sh/policy-resync-" >/dev/null || true
              done

              echo "policy-resync: done"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
{{- end }}
