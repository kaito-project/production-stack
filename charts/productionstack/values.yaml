# ─────────────────────────────────────────────────────────────────────────────
# productionstack — umbrella chart values.
#
# This chart bundles every CLUSTER-LEVEL component and CRD needed by the
# Kaito production stack. Each component is a Helm subchart under
# `charts/` and is independently toggleable via `<component>.enabled`.
#
# Per-subchart install namespace
# ──────────────────────────────
# Helm itself only accepts a single `--namespace` for the whole release.
# To install each subchart into its OWN namespace inside a single
# `helm install`, every subchart in this umbrella exposes a
# `namespaceOverride` value. When set, all of that subchart's
# namespaced resources are rendered into the override namespace
# instead of the release namespace; cluster-scoped resources
# (ClusterRole, ClusterRoleBinding, EnvoyFilter targeting handled via
# context) are unaffected.
#
# Caveats:
#   1. Target namespaces MUST already exist. `helm install
#      --create-namespace` only creates the RELEASE namespace, not the
#      override targets.
#   2. The Helm release metadata (Secret) is still stored in the
#      release namespace, but `helm uninstall` correctly cleans up
#      resources in every override namespace because it tracks the
#      rendered manifest, not the namespace.
#
# Override a subchart's own values by nesting them under the subchart
# name. The keys below mirror each subchart's `values.yaml` exactly;
# see the subchart's own README for the full set of supported keys.
#
# Example — install BBR into istio-system and the scaler into keda
# while the umbrella release itself lives in kaito-system:
#   helm upgrade --install productionstack charts/productionstack \
#     --namespace kaito-system --create-namespace \
#     --set body-based-routing.namespaceOverride=istio-system \
#     --set keda-kaito-scaler.namespaceOverride=keda
# (`istio-system` and `keda` must already exist.)
# ─────────────────────────────────────────────────────────────────────────────

# Body-Based Router (BBR) for the Gateway API Inference Extension.
# Cluster-wide WORKLOAD singleton: a single Deployment + Service. It no
# longer renders an EnvoyFilter, so it does NOT need to live in Istio's
# root namespace — it is co-located with this umbrella release.
# The per-namespace gateway wiring (ext_proc EnvoyFilter + outage
# local_reply, both scoped to each Gateway pod) is rendered by
# charts/modelharness; keep its `bbr.namespace` in sync with whatever
# namespace BBR ends up in here.
# See charts/body-based-routing/README.md for the full value reference.
body-based-routing:
  # Inherit the umbrella release namespace (kaito-system by default).
  # BBR is reached by its cluster FQDN, so it can live anywhere; set a
  # namespaceOverride only if you need it elsewhere (and then update
  # modelharness `bbr.namespace` to match).
  namespaceOverride: ""

# KEDA external scaler for vLLM / InferenceSet workloads.
# See charts/keda-kaito-scaler/values.yaml for the full value reference.
keda-kaito-scaler:
  # Co-locate with the KEDA control plane by default. Set to "" to
  # inherit the umbrella release namespace instead.
  namespaceOverride: keda

# GPU Node Mocker — fakes a Karpenter / azure-gpu-provisioner node
# provisioner for E2E and dev clusters that don't have real GPU
# capacity. Disabled by default because it requires an image push
# (`image.repository` has no sensible default) and is irrelevant on
# clusters that already run a real provisioner. Enable with:
#   --set gpu-node-mocker.enabled=true \
#   --set gpu-node-mocker.image.repository=<your-acr>/gpu-node-mocker \
#   --set gpu-node-mocker.image.tag=<tag>
# See charts/gpu-node-mocker/values.yaml for the full value reference.
gpu-node-mocker:
  enabled: false
  # Inherit the umbrella release namespace (kaito-system by default).
  # The mocker's ClusterRole is cluster-scoped and named
  # `gpu-node-mocker`, so at most one instance can exist per cluster
  # regardless of namespace.
  namespaceOverride: ""

# LLM Gateway Auth — API-key ext_authz for the inference Gateway.
# Pulled from the upstream `oci://mcr.microsoft.com/aks/kaito/helm`
# registry as a Helm dependency (no in-tree fork); run
# `helm dependency update charts/productionstack` once before installing
# so the tarball is vendored into `charts/productionstack/charts/`.
#
# Installs the APIKey CRD, the apikey-operator (reconciles APIKey →
# per-namespace `llm-api-key` Secret), and the apikey-authz ext_authz
# gRPC dataplane (single cluster-wide instance, consumed by
# per-namespace EnvoyFilters rendered by `charts/modelharness`). The
# 0.0.11-alpha bump replaces the historic
# MeshConfig.extensionProviders + post-install patch Job flow with a
# templated EnvoyFilter; that flow required a post-install Job to
# mutate the cluster-shared `istio` ConfigMap (impossible on the AKS
# Istio add-on where the MeshConfig ConfigMap lives in
# `aks-istio-system`).
#
# ext_authz wiring on inference Gateway pods is owned per-namespace by
# `charts/modelharness` (templates/envoyfilter-ext-authz.yaml) — auth
# scope in production-stack is per-workload-namespace, so each
# modelharness release inserts the ext_authz HTTP filter into its own
# `<namespace>-gw` Gateway pod and points it at the shared
# apikey-authz Service installed here. The upstream chart's own
# cluster-wide EnvoyFilter is therefore neutralised below (selector
# pinned to a label nothing matches and co-located in the LGA
# namespace) — leaving `istio.enabled: true` is still required so the
# apikey-authz Deployment gets a sidecar and the STRICT
# PeerAuthentication is rendered.
#
# Since chart version 0.0.8-alpha the upstream chart exposes a
# `namespaceOverride` knob, so its namespaced resources can be pinned
# to a dedicated namespace independent of the umbrella's release
# namespace — matching the pattern used by the other in-tree
# subcharts. Cluster-scoped resources (APIKey CRD,
# ValidatingWebhookConfiguration, ClusterRole, ClusterRoleBinding) are
# unaffected.
#
# The key below MUST match the dependency `name:` in Chart.yaml
# (`llm-gateway-apikey`), not the directory name.
llm-gateway-apikey:
  enabled: true
  # Co-locate the LGA control plane (apikey-operator, apikey-authz,
  # webhook cert Secret) in a dedicated namespace so the umbrella
  # release itself can live elsewhere (e.g. kaito-system). Set to "" to
  # inherit the umbrella release namespace instead.
  namespaceOverride: llm-gateway-auth
  # Mirror the umbrella's default LGA wiring so a single
  # `helm install productionstack` provisions a working data plane
  # without extra --set flags. Override at install time as needed.
  operator:
    image:
      repository: mcr.microsoft.com/aks/kaito/apikey-operator
  authz:
    image:
      repository: mcr.microsoft.com/aks/kaito/apikey-authz
  istio:
    # Keep istio.enabled=true so the upstream chart still injects a
    # sidecar into the apikey-authz Deployment (and emits NOTES.txt
    # context). The upstream chart also renders a cluster-wide
    # ext_authz EnvoyFilter under this flag — we deliberately
    # neutralise it below (see gatewayNamespace + gatewaySelector)
    # because auth in production-stack is owned per-namespace by
    # `charts/modelharness`.
    enabled: true
    # Skip the cluster-wide STRICT PeerAuthentication the chart would
    # otherwise render in the LGA namespace. We disable it because:
    #   * saturn-we (and other AKS Istio add-on clusters) may run a
    #     mix of mTLS modes across namespaces, and a STRICT PA in
    #     llm-gateway-auth would block plaintext probes from the
    #     control plane during the rollout.
    #   * the gateway pods that talk to apikey-authz already run an
    #     Istio sidecar (managed by the AKS Istio add-on), so mTLS to
    #     apikey-authz is auto-upgraded by Istio's PERMISSIVE default
    #     for any sidecar-to-sidecar hop; we don't gain much by also
    #     enforcing STRICT on the server side.
    # Flip back to `true` once the cluster is fully meshed and you
    # want to fail-closed on any non-mTLS traffic into apikey-authz.
    strictMTLS: false
    # Pin the cluster-wide EnvoyFilter to the LGA control-plane
    # namespace (rather than `default`) so the no-op resource lives
    # alongside the rest of the chart's manifests and never collides
    # with a user Gateway.
    gatewayNamespace: llm-gateway-auth
    # Sentinel label that no Gateway pod carries. The cluster-wide
    # EnvoyFilter still renders (required by the upstream template)
    # but selects zero workloads, so it has no effect on the data
    # plane. modelharness's per-namespace EnvoyFilter is the sole
    # source of ext_authz wiring on inference Gateways.
    gatewaySelector:
      kaito.sh/cluster-wide-ext-authz-disabled: "true"
    # Insert mode for the (neutralised) cluster-wide EnvoyFilter. Has
    # no runtime effect while the selector matches no pods, but kept
    # at the chart default to avoid surprising the upstream template.
    extAuthzInsert:
      operation: INSERT_FIRST

# modelMirror configures the cluster-wide model-mirror StorageClass
# (`kaito-model-mirror`) that KAITO's model-mirror download Job uses for its
# mirror PVCs. The StorageClass is rendered by
# templates/modelmirror-storageclass.yaml ONLY when `storageAccount` is
# non-empty. All values arrive as strings via the AKS-extension ConfigurationSettings.
#
# The StorageClass name (`kaito-model-mirror`) and provisioner
# (`blob.csi.azure.com`) are FIXED constants validated by KAITO's workspace
# controller, so they are not exposed as values.
modelMirror:
  # storageAccount is the pre-existing per-AIManager model-mirror storage
  # account name. Non-empty renders the StorageClass; empty (the default)
  # renders nothing. Pins the account the Blob CSI driver reuses for the
  # dynamically-created container.
  storageAccount: ""
  # resourceGroup is the resource group holding the storage account.
  resourceGroup: ""
  # clientID is the user-assigned managed identity (UAMI) client-id GUID used
  # for the keyless Workload-Identity mount. Same GUID as the streaming
  # ServiceAccount's azure.workload.identity/client-id (charts/modelharness).
  clientID: ""

# cloudprovider selects which cloud provider's integrations render.
# Cloud-specific templates (those living under templates/<provider>/)
# are gated on this matching their subfolder AND the per-feature
# `.enabled` toggle. Empty string — the default — keeps the chart
# provider-agnostic and renders zero cloud-specific resources.
#
# Enabling `azure.<feature>.enabled=true` without setting
# `cloudprovider=azure` is a hard error (template `fail`), not a
# silent no-op — config drift between the two knobs should be caught
# at install time.
cloudprovider: ""

# azure groups every Azure-specific integration under one namespace.
# Each sub-feature carries its own `.enabled` toggle in addition to
# the top-level `cloudprovider` gate — opting into Azure doesn't
# force every Azure feature on.
azure:
  # defaultDomain renders the cluster-wide DefaultDomainCertificate CR
  # that triggers the AKS App-Routing operator to reconcile a TLS Secret
  # containing an Azure-issued wildcard cert for the cluster's aksapp.io
  # default domain, and to auto-renew it.
  #
  # One DDC per cluster is sufficient — the cert covers the wildcard
  # host, and every per-namespace Gateway (rendered by charts/modelharness)
  # cross-namespace-references the reconciled Secret.
  #
  # The DDC is pinned to the `kube-system` namespace regardless of the
  # productionstack release namespace. Rationale: the DDC and its
  # reconciled Secret are cluster-level shared state; kube-system is the
  # natural home, matches AI Manager RP conventions (`kubectl apply -n
  # kube-system` in the reference bootstrap), and gives consuming
  # Gateways a stable, well-known referent namespace.
  #
  # ReferenceGrants authorising each consumer namespace to reference
  # the Secret are rendered by charts/modelharness (not here) into
  # kube-system, so productionstack stays free of consumer-namespace
  # knowledge and each modelharness release brings its own grant.
  #
  # AKS cluster prerequisites (all required; enabling only some leaves
  # the DDC stuck at Available=False):
  #   - Application Routing add-on          (`--enable-app-routing`)
  #   - Application Routing Gateway API     (`--enable-app-routing-istio`)
  #   - Managed Gateway API CRDs installed
  #
  # NOTE: `--enable-app-routing-istio` is mutually exclusive with the
  # Istio service-mesh add-on. Consuming Gateways MUST set
  # `gatewayClassName: approuting-istio` in charts/modelharness — the
  # vanilla `istio` GatewayClass will not reconcile default-domain TLS.
  #
  # The App-Routing operator's cluster-scoped `default-domain-dns`
  # ClusterExternalDNS auto-publishes the A record for the aksapp.io
  # hostname; this chart does NOT render an ExternalDNS.
  defaultDomain:
    enabled: false

    # namespace is where the DefaultDomainCertificate CR (and the
    # reconciled TLS Secret) lives. Defaults to `kube-system` — the
    # natural home for cluster-level shared state and matches AI Manager
    # RP conventions. Consumers in charts/modelharness reference the
    # Secret cross-namespace via `azure.defaultDomain.secretRef.namespace`,
    # which MUST match this value.
    namespace: kube-system

    # name is the DefaultDomainCertificate CR name.
    name: "cert"

    # secretName is the kubernetes.io/tls Secret the App-Routing operator
    # populates and rotates (in kube-system). Must be a DNS-1123 label
    # (matches the DefaultDomainCertificate CRD's own validation on
    # `spec.target.secret`) and <= 63 chars. Consuming Gateways in
    # charts/modelharness must reference the same name/namespace via
    # `azure.defaultDomain.secretRef`.
    secretName: "cert"
