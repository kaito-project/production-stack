# ─────────────────────────────────────────────────────────────────────────────
# productionstack — umbrella chart values.
#
# This chart bundles every CLUSTER-LEVEL component and CRD needed by the
# Kaito production stack. Each component is a Helm subchart under
# `charts/` and is independently toggleable via `<component>.enabled`.
#
# Per-subchart install namespace
# ──────────────────────────────
# Helm itself only accepts a single `--namespace` for the whole release.
# To install each subchart into its OWN namespace inside a single
# `helm install`, every subchart in this umbrella exposes a
# `namespaceOverride` value. When set, all of that subchart's
# namespaced resources are rendered into the override namespace
# instead of the release namespace; cluster-scoped resources
# (ClusterRole, ClusterRoleBinding, EnvoyFilter targeting handled via
# context) are unaffected.
#
# Caveats:
#   1. Target namespaces MUST already exist. `helm install
#      --create-namespace` only creates the RELEASE namespace, not the
#      override targets.
#   2. The Helm release metadata (Secret) is still stored in the
#      release namespace, but `helm uninstall` correctly cleans up
#      resources in every override namespace because it tracks the
#      rendered manifest, not the namespace.
#
# Override a subchart's own values by nesting them under the subchart
# name. The keys below mirror each subchart's `values.yaml` exactly;
# see the subchart's own README for the full set of supported keys.
#
# By default every subchart below installs into kube-system, and the
# umbrella release itself is also installed into kube-system. Override a
# subchart's namespaceOverride to relocate it — e.g. install BBR into
# istio-system and the scaler into keda:
#   helm upgrade --install productionstack charts/productionstack \
#     --namespace kube-system --create-namespace \
#     --set body-based-routing.namespaceOverride=istio-system \
#     --set keda-kaito-scaler.namespaceOverride=keda
# (`istio-system` and `keda` must already exist.)
# ─────────────────────────────────────────────────────────────────────────────

# Body-Based Router (BBR) for the Gateway API Inference Extension.
# Cluster-wide WORKLOAD singleton: a single Deployment + Service. It no
# longer renders an EnvoyFilter, so it does NOT need to live in Istio's
# root namespace — it is installed into kube-system by default.
# The per-namespace gateway wiring (ext_proc EnvoyFilter + outage
# local_reply, both scoped to each Gateway pod) is rendered by
# charts/modelharness; keep its `bbr.namespace` in sync with whatever
# namespace BBR ends up in here.
# See charts/body-based-routing/README.md for the full value reference.
body-based-routing:
  # Install BBR into kube-system by default. BBR is reached by its
  # cluster FQDN, so it can live anywhere; change this only if you need
  # it elsewhere (and then update modelharness `bbr.namespace` to match).
  namespaceOverride: kube-system

# KEDA external scaler for vLLM / InferenceSet workloads.
# See charts/keda-kaito-scaler/values.yaml for the full value reference.
keda-kaito-scaler:
  # Co-locate with the KEDA control plane in kube-system by default. Set
  # to "" to inherit the umbrella release namespace instead.
  namespaceOverride: kube-system

# LLM Gateway Auth — API-key ext_authz for the inference Gateway.
# Pulled from the upstream `oci://mcr.microsoft.com/aks/kaito/helm`
# registry as a Helm dependency (no in-tree fork); run
# `helm dependency update charts/productionstack` once before installing
# so the tarball is vendored into `charts/productionstack/charts/`.
#
# Installs the APIKey CRD, the apikey-operator (reconciles APIKey →
# per-namespace `llm-api-key` Secret), and the apikey-authz ext_authz
# gRPC dataplane (single cluster-wide instance, consumed by
# per-namespace EnvoyFilters rendered by `charts/modelharness`). The
# 0.0.11-alpha bump replaces the historic
# MeshConfig.extensionProviders + post-install patch Job flow with a
# templated EnvoyFilter; that flow required a post-install Job to
# mutate the cluster-shared `istio` ConfigMap (impossible on the AKS
# Istio add-on where the MeshConfig ConfigMap lives in
# `aks-istio-system`).
#
# ext_authz wiring on inference Gateway pods is owned per-namespace by
# `charts/modelharness` (templates/envoyfilter-ext-authz.yaml) — auth
# scope in production-stack is per-workload-namespace, so each
# modelharness release inserts the ext_authz HTTP filter into its own
# `<namespace>-gw` Gateway pod and points it at the shared
# apikey-authz Service installed here. The upstream chart's own
# cluster-wide EnvoyFilter is therefore neutralised below (selector
# pinned to a label nothing matches and co-located in the LGA
# namespace) — leaving `istio.enabled: true` is still required so the
# apikey-authz Deployment gets a sidecar and the STRICT
# PeerAuthentication is rendered.
#
# Since chart version 0.0.8-alpha the upstream chart exposes a
# `namespaceOverride` knob, so its namespaced resources can be pinned
# to a dedicated namespace independent of the umbrella's release
# namespace — matching the pattern used by the other in-tree
# subcharts. Cluster-scoped resources (APIKey CRD,
# ValidatingWebhookConfiguration, ClusterRole, ClusterRoleBinding) are
# unaffected.
#
# The key below MUST match the dependency `name:` in Chart.yaml
# (`llm-gateway-apikey`), not the directory name.
llm-gateway-apikey:
  enabled: true
  # Co-locate the LGA control plane (apikey-operator, apikey-authz,
  # webhook cert Secret) in kube-system by default. Set to "" to
  # inherit the umbrella release namespace instead.
  namespaceOverride: kube-system
  # Mirror the umbrella's default LGA wiring so a single
  # `helm install productionstack` provisions a working data plane
  # without extra --set flags. Override at install time as needed.
  operator:
    image:
      repository: mcr.microsoft.com/aks/kaito/apikey-operator
  authz:
    image:
      repository: mcr.microsoft.com/aks/kaito/apikey-authz
  istio:
    # Keep istio.enabled=true so the upstream chart still injects a
    # sidecar into the apikey-authz Deployment (and emits NOTES.txt
    # context). The upstream chart also renders a cluster-wide
    # ext_authz EnvoyFilter under this flag — we deliberately
    # neutralise it below (see gatewayNamespace + gatewaySelector)
    # because auth in production-stack is owned per-namespace by
    # `charts/modelharness`.
    enabled: true
    # Skip the cluster-wide STRICT PeerAuthentication the chart would
    # otherwise render in the LGA namespace. We disable it because:
    #   * saturn-we (and other AKS Istio add-on clusters) may run a
    #     mix of mTLS modes across namespaces, and a STRICT PA in
    #     kube-system would block plaintext probes from the
    #     control plane during the rollout.
    #   * the gateway pods that talk to apikey-authz already run an
    #     Istio sidecar (managed by the AKS Istio add-on), so mTLS to
    #     apikey-authz is auto-upgraded by Istio's PERMISSIVE default
    #     for any sidecar-to-sidecar hop; we don't gain much by also
    #     enforcing STRICT on the server side.
    # Flip back to `true` once the cluster is fully meshed and you
    # want to fail-closed on any non-mTLS traffic into apikey-authz.
    strictMTLS: false
    # Pin the cluster-wide EnvoyFilter to the LGA control-plane
    # namespace (kube-system) so the no-op resource lives alongside the
    # rest of the chart's manifests and never collides with a user
    # Gateway.
    gatewayNamespace: kube-system
    # Sentinel label that no Gateway pod carries. The cluster-wide
    # EnvoyFilter still renders (required by the upstream template)
    # but selects zero workloads, so it has no effect on the data
    # plane. modelharness's per-namespace EnvoyFilter is the sole
    # source of ext_authz wiring on inference Gateways.
    gatewaySelector:
      kaito.sh/cluster-wide-ext-authz-disabled: "true"
    # Insert mode for the (neutralised) cluster-wide EnvoyFilter. Has
    # no runtime effect while the selector matches no pods, but kept
    # at the chart default to avoid surprising the upstream template.
    extAuthzInsert:
      operation: INSERT_FIRST
