# ─────────────────────────────────────────────────────────────────────────────
# body-based-routing chart values.
#
# Design intent for this fork:
#   1. BBR is a cluster-wide WORKLOAD singleton: a single Deployment +
#      Service + cluster-scoped RBAC. It is co-located with the
#      productionstack umbrella release (kaito-system by default) — it
#      no longer has to live in Istio's root namespace because this
#      chart no longer renders any EnvoyFilter. The gateway dataplane
#      wiring (the ext_proc EnvoyFilter that injects BBR into a
#      Gateway's HCM) is rendered per-workload-namespace by
#      charts/modelharness and scoped to that namespace's Gateway pod
#      via a workloadSelector, so BBR's Service is reached purely by
#      its cluster FQDN regardless of which namespace it runs in.
#
#   2. BBR always runs in INSECURE serving mode (--secure-serving=false)
#      so the ext_proc gRPC listener speaks plaintext HTTP/2. The
#      gateway↔BBR hop never leaves the pod network and there is no
#      upstream TLS / DestinationRule: the modelharness EnvoyFilter
#      wires the upstream cluster as plain HTTP/2.
# ─────────────────────────────────────────────────────────────────────────────

# Install namespace for every namespaced resource rendered by this
# chart (Deployment, Service, ServiceAccount). Also drives the upstream
# cluster FQDN (`<svc>.<ns>.svc.cluster.local`) that charts/modelharness
# uses when wiring BBR into a Gateway's HCM, so whatever namespace BBR
# ends up in MUST match the `bbr.namespace` value configured in
# modelharness. Empty string ⇒ inherit the Helm release namespace
# (standard Helm behavior).
#
# BBR no longer renders an EnvoyFilter, so it is NOT required to live in
# Istio's root namespace; co-locating it with the umbrella release
# (kaito-system) is the default. The target namespace MUST already
# exist — Helm only auto-creates the release namespace.
namespaceOverride: ""

bbr:
  # Singleton Deployment + Service name. Kept identical to the upstream
  # default so any tooling that hard-codes `body-based-router` (the
  # upstream chart's default) continues to work.
  name: body-based-router

  # BBR ext_proc sits on the hot path of EVERY inference request and is
  # a cluster-scope singleton, so a single replica is a single point of
  # failure. Run at least two replicas for HA so the loss of one
  # replica (or its node) is a transparent failover rather than a
  # cluster-wide `502 bbr_unavailable` outage. `values.schema.json`
  # pins the minimum to 2; do NOT lower this below 2.
  replicas: 2

  # Spread the BBR replicas across distinct nodes so a single node
  # failure cannot take down every replica at once. Anti-affinity is
  # load-bearing for HA (issue #89) and is therefore always rendered;
  # only its strength (`type`) and `topologyKey` are tunable.
  podAntiAffinity:
    # `soft` => preferredDuringSchedulingIgnoredDuringExecution: a
    #           best-effort spread that still lets every replica
    #           schedule on a single-node (e.g. kind / dev) cluster.
    # `hard` => requiredDuringSchedulingIgnoredDuringExecution: a
    #           replica stays Pending until a distinct node is free.
    #           Use only on clusters guaranteed to have >= replicas
    #           schedulable nodes.
    type: soft
    # Topology domain across which replicas are spread. `hostname`
    # spreads per node; switch to `topology.kubernetes.io/zone` to
    # spread per availability zone instead.
    topologyKey: kubernetes.io/hostname

  # Active gRPC health checking for the ext_proc upstream cluster.
  #
  # BBR serves the gRPC health protocol (grpc.health.v1.Health) ONLY on
  # `healthCheckPort` (9005) — the ext_proc port (9004) registers just
  # the ExternalProcessor service and would answer a health probe with
  # UNIMPLEMENTED. So the active health check is wired at the platform
  # layer: Kubernetes actively probes BBR's gRPC health service on
  # `healthCheckPort`, and the resulting pod Ready condition drives the
  # Istio EDS endpoint set for the
  # `outbound|<port>||body-based-router...` ext_proc cluster. Only
  # Ready replicas are programmed into the cluster, so an unhealthy
  # replica is pulled out of the ext_proc load-balancing set instead of
  # failing requests closed. Combined with the passive outlier
  # detection rendered by charts/modelharness (see modelharness
  # `bbr.outlierDetection`), the fail-closed `502 bbr_unavailable` path
  # only fires when EVERY replica is unhealthy. These probes are
  # load-bearing for HA and are therefore always rendered; only their
  # timing knobs are tunable.
  healthCheck:
    liveness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

  image:
    registry: us-central1-docker.pkg.dev/k8s-staging-images
    repository: gateway-api-inference-extension/bbr
    tag: v1.5.0
    pullPolicy: Always

  # ext_proc gRPC port. Must match the cluster_name port in the
  # BBR EnvoyFilter rendered by charts/modelharness
  # (templates/envoyfilter-bbr.yaml) and the modelharness `bbr.port`.
  port: 9004
  # gRPC health-check port consumed by liveness/readiness probes (and
  # by the GKE provider's HealthCheckPolicy when that provider is wired
  # up — not used in this repo, kept for upstream parity).
  healthCheckPort: 9005

  # Extra cmd-line flags forwarded to BBR as `--<key>=<value>`. The
  # `secure-serving` flag is rendered as a hardcoded `false` (BBR always
  # serves plaintext HTTP/2 in this fork) and MUST NOT be set here.
  flags:
    # Log verbosity.
    v: 3

  # BBR plugin pipeline. When this list is non-empty the runner skips
  # its built-in default auto-load, so the two entries below replicate
  # upstream's default behavior (extract `model` body field into
  # `X-Gateway-Model-Name`, then map base-model aliases to their
  # canonical model names).
  plugins:
    - type: body-field-to-header
      name: model-extractor
      json:
        fieldName: model
        headerName: X-Gateway-Model-Name
    - type: base-model-to-header
      name: base-model-mapper

  tracing:
    enabled: false
    otelServiceName: "gateway-api-inference-extension/bbr"
    otelExporterEndpoint: "http://localhost:4317"
    sampling:
      sampler: "parentbased_traceidratio"
      samplerArg: "0.1"
