apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.bbr.name }}
  namespace: {{ include "bbr.namespace" . }}
  labels:
    {{- include "bbr.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bbr.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "bbr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bbr.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "bbr.serviceAccountName" . }}
      {{- if .Values.bbr.podAntiAffinity.enabled }}
      # Spread BBR replicas across distinct {{ .Values.bbr.podAntiAffinity.topologyKey }}
      # domains so a single node failure cannot take down every replica
      # at once (issue #89: BBR is a cluster-scope SPOF on the request
      # hot path).
      affinity:
        podAntiAffinity:
          {{- if eq .Values.bbr.podAntiAffinity.type "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: {{ .Values.bbr.podAntiAffinity.topologyKey }}
              labelSelector:
                matchLabels:
                  {{- include "bbr.selectorLabels" . | nindent 18 }}
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: {{ .Values.bbr.podAntiAffinity.topologyKey }}
                labelSelector:
                  matchLabels:
                    {{- include "bbr.selectorLabels" . | nindent 20 }}
          {{- end }}
      {{- end }}
      containers:
        - name: bbr
          image: "{{ .Values.bbr.image.registry }}/{{ .Values.bbr.image.repository }}:{{ .Values.bbr.image.tag }}"
          imagePullPolicy: {{ .Values.bbr.image.pullPolicy }}
          args:
            - "--streaming"
            # Render --secure-serving from the dedicated toggle (NOT the
            # generic flags map below) so values.yaml has a single
            # source of truth and we cannot accidentally render the
            # flag twice.
            - "--secure-serving={{ .Values.bbr.secureServing }}"
            {{- range $key, $value := .Values.bbr.flags }}
            - --{{ $key }}={{ $value }}
            {{- end }}
            {{- range .Values.bbr.plugins }}
            - --plugin
            {{- if .json }}
            - {{ printf "%s:%s:%s" .type .name (toJson .json) | quote }}
            {{- else }}
            - {{ printf "%s:%s" .type .name | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.bbr.tracing.enabled }}
            - --tracing=true
            {{- else }}
            - --tracing=false
            {{- end }}
          env:
            {{- if .Values.bbr.tracing.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.bbr.tracing.otelServiceName }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.bbr.tracing.otelExporterEndpoint }}
            - name: OTEL_RESOURCE_ATTRIBUTES_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: OTEL_RESOURCE_ATTRIBUTES_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: 'k8s.namespace.name=$(NAMESPACE),k8s.node.name=$(OTEL_RESOURCE_ATTRIBUTES_NODE_NAME),k8s.pod.name=$(OTEL_RESOURCE_ATTRIBUTES_POD_NAME)'
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.bbr.tracing.sampling.sampler | quote }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.bbr.tracing.sampling.samplerArg | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            {{- end }}
          ports:
            - name: grpc-ext-proc
              containerPort: {{ .Values.bbr.port }}
            - name: grpc-health
              containerPort: {{ .Values.bbr.healthCheckPort }}
          {{- if .Values.bbr.healthCheck.enabled }}
          # Active gRPC health checking against BBR's grpc.health.v1.Health
          # service on healthCheckPort. The readiness result drives the
          # pod Ready condition, which drives the Istio EDS endpoint set
          # for the ext_proc upstream cluster, so an unhealthy replica is
          # pulled out of the load-balancing set rather than failing
          # requests closed. (BBR serves the health protocol only on
          # healthCheckPort, never on the ext_proc port {{ .Values.bbr.port }}.)
          livenessProbe:
            grpc:
              port: {{ .Values.bbr.healthCheckPort }}
            initialDelaySeconds: {{ .Values.bbr.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.bbr.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.bbr.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.bbr.healthCheck.liveness.failureThreshold }}
          readinessProbe:
            grpc:
              port: {{ .Values.bbr.healthCheckPort }}
            initialDelaySeconds: {{ .Values.bbr.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.bbr.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.bbr.healthCheck.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.bbr.healthCheck.readiness.failureThreshold }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.bbr.name }}
  namespace: {{ include "bbr.namespace" . }}
  labels:
    {{- include "bbr.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "bbr.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc-ext-proc
      protocol: TCP
      port: {{ .Values.bbr.port }}
      targetPort: {{ .Values.bbr.port }}
      # HTTP2 (h2c) so Envoy's outbound cluster speaks plaintext
      # gRPC. When `bbr.secureServing=true` this is still HTTP/2 — the
      # only difference is the rendered DestinationRule below adds an
      # upstream TLS context.
      appProtocol: HTTP2
