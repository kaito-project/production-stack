apiVersion: v2
name: productionstack
description: |
  Umbrella Helm chart that installs all CLUSTER-LEVEL components and CRDs
  required by the Kaito production stack: body-based routing (BBR),
  KEDA Kaito scaler, LLM gateway auth, and other shared infrastructure.

  This chart is intended to be consumed as a dependency of the top-level
  `kaito` Helm chart. Each component is shipped as a subchart under
  `charts/`. body-based-routing and keda-kaito-scaler are mandatory
  cluster infrastructure and are always installed; optional components
  (e.g. llm-gateway-apikey) carry a `<component>.enabled` toggle in
  values.yaml. Component-specific values are passed through by nesting
  them under the subchart's name, e.g.:

      body-based-routing:
        bbr:
          replicas: 2

  Adding a new cluster-level component is a matter of dropping its chart
  under `charts/` and appending a new entry to the `dependencies` list
  below.
type: application
version: 0.3.1
appVersion: "0.3.1"
keywords:
  - kaito
  - production-stack
  - inference
  - gateway-api-inference-extension
  - keda
home: https://github.com/kaito-project/production-stack
sources:
  - https://github.com/kaito-project/production-stack
maintainers:
  - name: kaito-project
    url: https://github.com/kaito-project

dependencies:
  - name: body-based-routing
    version: 0.1.0
    tags:
      - gateway
      - routing
  - name: keda-kaito-scaler
    version: 0.6.1
    tags:
      - autoscaling
  # In-tree gpu-node-mocker chart. Sourced via a `file://` repository
  # so the standalone chart at `charts/gpu-node-mocker` remains the
  # single source of truth (still published independently to OCI / gh-
  # pages); `helm dependency update charts/productionstack` packages
  # it and vendors the tarball into `charts/productionstack/charts/`.
  # Gated behind `gpu-node-mocker.enabled` because the mocker requires
  # an `image.repository` and is only relevant for E2E / dev clusters
  # that don't have a real GPU node provisioner.
  - name: gpu-node-mocker
    version: 0.3.1
    repository: file://../gpu-node-mocker
    condition: gpu-node-mocker.enabled
    tags:
      - node-provisioner
      - mocker
  # Upstream API-key ext_authz chart, pulled from the kaito-project OCI
  # registry at `helm dependency update` time (no in-tree fork). Values
  # are passed through under the upstream chart name `llm-gateway-apikey`
  # in values.yaml.
  #
  # Since 0.0.11-alpha the chart ships its own `EnvoyFilter` (under
  # `templates/istio/envoyfilter.yaml`) that inserts ext_authz directly
  # into the inference gateway HTTP filter chain — replacing the
  # historic MeshConfig.extensionProviders + post-install patch Job
  # flow. The EnvoyFilter is rendered into `istio.gatewayNamespace` and
  # is part of the umbrella `productionstack` release manifest, so
  # `helm uninstall productionstack` cleans it up automatically.
  - name: llm-gateway-apikey
    version: 0.0.12-alpha
    repository: oci://mcr.microsoft.com/aks/kaito/helm
    condition: llm-gateway-apikey.enabled
    tags:
      - gateway
      - auth
