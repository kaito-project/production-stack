apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-node-mocker.fullname" . }}
  namespace: {{ include "gpu-node-mocker.namespace" . }}
  labels:
    {{- include "gpu-node-mocker.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gpu-node-mocker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-node-mocker.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "gpu-node-mocker.fullname" . }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --shadow-pod-image={{ .Values.shadowPod.image }}
            - --uds-tokenizer-image={{ .Values.shadowPod.udsTokenizerImage }}
            {{- with .Values.shadowPod.timeToFirstToken }}
            - --time-to-first-token={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.interTokenLatency }}
            - --inter-token-latency={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.timeToFirstTokenStdDev }}
            - --time-to-first-token-std-dev={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.interTokenLatencyStdDev }}
            - --inter-token-latency-std-dev={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.kvCacheTransferLatency }}
            - --kv-cache-transfer-latency={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.kvCacheTransferLatencyStdDev }}
            - --kv-cache-transfer-latency-std-dev={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.timeFactorUnderLoad }}
            - --time-factor-under-load={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.latencyCalculator }}
            - --latency-calculator={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.prefillOverhead }}
            - --prefill-overhead={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.prefillTimePerToken }}
            - --prefill-time-per-token={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.prefillTimeStdDev }}
            - --prefill-time-std-dev={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.kvCacheTransferTimePerToken }}
            - --kv-cache-transfer-time-per-token={{ . }}
            {{- end }}
            {{- with .Values.shadowPod.kvCacheTransferTimeStdDev }}
            - --kv-cache-transfer-time-std-dev={{ . }}
            {{- end }}
            - --lease-duration-seconds={{ .Values.leaseDurationSeconds }}
            - --lease-renew-interval-seconds={{ .Values.leaseRenewIntervalSeconds }}
            - --node-provisioner={{ .Values.nodeProvisioner }}
            - --node-class-group={{ .Values.nodeClass.group }}
            - --node-class-version={{ .Values.nodeClass.version }}
            - --node-class-kind={{ .Values.nodeClass.kind }}
            - --node-class-resource={{ .Values.nodeClass.resource }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
