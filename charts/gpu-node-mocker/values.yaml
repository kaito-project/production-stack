# Install namespace for namespaced resources (Deployment, ServiceAccount,
# RoleBinding subject). Empty string ⇒ inherit the Helm release namespace
# (standard Helm behavior). Used when consumed as a subchart of the
# productionstack umbrella so the mocker can live in a dedicated namespace
# (e.g. kaito-system) independent of the umbrella release namespace.
namespaceOverride: ""

image:
  # REQUIRED: set via --set image.repository=<your-acr>.azurecr.io/gpu-node-mocker
  repository: "ghcr.io/kaito-project/gpu-node-mocker"
  tag: latest
  pullPolicy: IfNotPresent

shadowPod:
  image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.1
  udsTokenizerImage: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.6.0
  # Latency knobs are resolved per-InferenceSet from a latency profile. By
  # default the profile is auto-selected from the served model size
  # (<5B ⇒ small-l40s, 5–25B ⇒ 8b-h100, ≥25B ⇒ 70b-tp8; see
  # llm-d-inference-sim/manifests/latency-profiles). An InferenceSet can override
  # the profile and calculator via pod-template annotations:
  #   kaito.sh/latency-profile: auto | small-l40s | 8b-h100 | 70b-tp8
  #   kaito.sh/latency-calculator: per-token | constant
  #
  # The values below are OPERATOR-WIDE DEFAULTS: set one to provide the baseline
  # for that knob. The selected latency profile OVERRIDES a default whenever the
  # profile defines that knob; a default only applies when the profile leaves it
  # empty. Leave a value empty ("") to have no default and rely solely on the
  # profile (recommended).
  timeToFirstToken: ""
  interTokenLatency: ""
  timeToFirstTokenStdDev: ""
  interTokenLatencyStdDev: ""
  kvCacheTransferLatency: ""
  kvCacheTransferLatencyStdDev: ""
  timeFactorUnderLoad: ""
  # latencyCalculator is the operator-wide default calculator ("per-token" or
  # "constant") used when a pod has no kaito.sh/latency-calculator annotation.
  # Empty ⇒ "per-token".
  latencyCalculator: ""
  prefillOverhead: ""
  prefillTimePerToken: ""
  prefillTimeStdDev: ""
  kvCacheTransferTimePerToken: ""
  kvCacheTransferTimeStdDev: ""

# nodeProvisioner selects which KAITO node provisioner to mock.
# Must match KAITO's --node-provisioner value: azure-gpu-provisioner or karpenter.
nodeProvisioner: karpenter

# nodeClass selects the karpenter NodeClass kind the mocker reconciles (and
# discovery-checks at startup) in karpenter mode. The default mock node class
# lives in the karpenter.kaito.sh group, which a real Karpenter provider does
# NOT recognize — so a KAITO NodePool referencing it is ignored by real
# karpenter and handled only by gpu-node-mocker. Point KAITO's
# karpenterProviders.<provider> group/kind/version/resourceName at the SAME
# values so its NodePool nodeClassRef and the NodeClass objects it creates
# match what the mocker watches. Set to the karpenter.azure.com AKSNodeClass
# values to mock the real Azure node class instead.
nodeClass:
  group: karpenter.kaito.sh
  version: v1alpha1
  kind: MockNodeClass
  resource: mocknodeclasses

leaseDurationSeconds: 40
leaseRenewIntervalSeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
